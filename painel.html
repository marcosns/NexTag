<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel NexTag</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input, button, select{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="card" id="loginDiv">
  <h3>Login</h3>
  <input id="usuario" placeholder="Usuário">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="loginMsg"></p>
</div>

<div class="card" id="painelDiv" style="display:none;">
  <h3>Painel</h3>

  <select id="projetoSelect"></select>

  <input id="nomeArquivo" placeholder="Nome do arquivo">
  <input id="fileLink" placeholder="Link do arquivo">

  <button onclick="salvar()">Adicionar</button>

  <p id="statusMsg"></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzN0gXeXT-kbHhXioO0lyHUALzPeROi-DhMeN5zOLpMoPxETlHzq0gKT9tl8tZPdPLwuA/exec";

let projetosPermitidos = [];

// 🔹 LOGIN (GET - SEM CORS)
async function login(){

  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  const url = `${API_URL}?action=login&usuario=${encodeURIComponent(usuario)}&senha=${encodeURIComponent(senha)}`;

  const res = await fetch(url);
  const data = await res.json();

  if(data.ok){
    projetosPermitidos = data.projetos;

    document.getElementById("loginDiv").style.display="none";
    document.getElementById("painelDiv").style.display="block";

    carregarProjetos();
  }else{
    document.getElementById("loginMsg").innerText = data.erro;
  }
}

// 🔹 carregar projetos
function carregarProjetos(){
  const select = document.getElementById("projetoSelect");
  select.innerHTML="";

  projetosPermitidos.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });
}

// 🔹 salvar arquivo (GET)
async function salvar(){

  const projeto = document.getElementById("projetoSelect").value;
  const nome = document.getElementById("nomeArquivo").value;
  const link = document.getElementById("fileLink").value;

  const url = `${API_URL}?action=addArquivo&projeto=${encodeURIComponent(projeto)}&nome=${encodeURIComponent(nome)}&link=${encodeURIComponent(link)}`;

  const res = await fetch(url);
  const data = await res.json();

  if(data.ok){
    document.getElementById("statusMsg").innerText="Salvo!";
  }else{
    document.getElementById("statusMsg").innerText=data.erro;
  }
}
</script>

</body>
</html>
