<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyecdVMJgL508DIGiU5NHEkJvZDK4XX3K4yVPTjcq140UaabQccx-UvQss8hCKDCUZ-ZQ/exec"

let usuarioLogado = null
let obrasPermitidas = []
let iconeSelecionado = "fas fa-file"

// 🔥 LISTA DE ÍCONES
const icones = [
  "fas fa-file","fas fa-file-pdf","fas fa-image",
  "fas fa-video","fas fa-music","fas fa-book",
  "fas fa-file-word","fas fa-file-excel","fas fa-file-powerpoint",
  "fas fa-download","fas fa-link","fas fa-folder"
]

// 🔥 RENDERIZAR ÍCONES
function renderizarIcones(){
  const grid = document.getElementById("iconesGrid")
  grid.innerHTML = ""

  icones.forEach(icon=>{
    const div = document.createElement("div")
    div.className = "icone-item"
    div.innerHTML = `<i class="${icon}"></i>`

    div.onclick = ()=>{
      document.querySelectorAll(".icone-item").forEach(i=>i.classList.remove("selected"))
      div.classList.add("selected")
      iconeSelecionado = icon
      document.getElementById("icone").value = icon
    }

    grid.appendChild(div)
  })
}

// 🔹 LOGIN
async function login(){
  const user = document.getElementById("usuario").value
  const senha = document.getElementById("senha").value

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({action:"login", usuario:user, senha:senha})
  })

  const data = await res.json()

  if(data.ok){
    usuarioLogado = user
    obrasPermitidas = data.obras

    document.getElementById("loginDiv").style.display = "none"
    document.getElementById("painelDiv").style.display = "block"

    preencherObras()
    renderizarIcones()

    // 🔥 carregar visual da primeira obra
    if(obrasPermitidas.length > 0){
      carregarObra(obrasPermitidas[0])
    }

  } else {
    document.getElementById("loginMsg").innerText = "Usuário ou senha incorretos"
  }
}

// 🔹 PREENCHER OBRAS
function preencherObras(){
  const select = document.getElementById("obraSelect")
  select.innerHTML = ""

  obrasPermitidas.forEach(o=>{
    const opt = document.createElement("option")
    opt.value = o
    opt.innerText = o
    select.appendChild(opt)
  })

  // 🔥 ao trocar obra
  select.onchange = ()=>{
    carregarObra(select.value)
  }
}

// 🔥 CARREGAR OBRA (AGORA FUNCIONANDO COM BACKEND NOVO)
async function carregarObra(id){

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({action:"getObraCompleta", id_obra:id})
  })

  const data = await res.json()

  if(!data.ok) return

  const obra = data.obra

  // BACKGROUND
  if(obra.background){
    document.body.style.background = `url('${obra.background}') no-repeat center/cover`
  }

  // LOGO (evita duplicar)
  const antigo = document.getElementById("logoObra")
  if(antigo) antigo.remove()

  if(obra.logo){
    document.querySelector(".container").insertAdjacentHTML("afterbegin",
      `<img id="logoObra" src="${obra.logo}" style="width:120px;margin-bottom:15px;">`
    )
  }
}

// 🔹 ADICIONAR ARQUIVO
async function adicionarArquivo(){

  const obra = document.getElementById("obraSelect").value
  const nome = document.getElementById("nomeArquivo").value
  const link = document.getElementById("fileLink").value.trim()

  if(!nome || !link){
    document.getElementById("statusMsg").innerText = "Preencha Nome e Link!"
    return
  }

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"addArquivo",
      usuario:usuarioLogado,
      obra,
      nome,
      link,
      icone: iconeSelecionado
    })
  })

  const data = await res.json()

  if(data.ok){
    document.getElementById("statusMsg").innerText = "Arquivo adicionado com sucesso!"

    document.getElementById("nomeArquivo").value=""
    document.getElementById("fileLink").value=""
  } else {
    document.getElementById("statusMsg").innerText = "Erro ao adicionar arquivo"
  }
}

// 🔹 LOGOUT
function logout(){
  usuarioLogado = null
  obrasPermitidas = []

  document.getElementById("loginDiv").style.display = "block"
  document.getElementById("painelDiv").style.display = "none"

  document.getElementById("loginMsg").innerText = ""
  document.getElementById("statusMsg").innerText = ""
}
</script>
