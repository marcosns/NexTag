<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel NexTag</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:350px;
  margin:100px auto;
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
}

#painelDiv{
  display:none;
  width:90%;
  max-width:800px;
  margin:30px auto;
}

.item{
  background:#1e293b;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="card" id="loginDiv">
  <h2>Login</h2>
  <input id="usuario" placeholder="usuario">
  <input id="senha" type="password" placeholder="senha">
  <button onclick="login()">Entrar</button>
  <p id="loginMsg"></p>
</div>

<div id="painelDiv">

  <h2>Painel</h2>

  <select id="projetoSelect" onchange="carregarArquivos()"></select>

  <input id="nomeArquivo" placeholder="nome">
  <input id="fileId" placeholder="fileId do google drive">

  <select id="icone">
    <option value="fas fa-file">Arquivo</option>
    <option value="fas fa-image">Imagem</option>
    <option value="fas fa-file-pdf">PDF</option>
    <option value="fas fa-drafting-compass">Projeto</option>
  </select>

  <button onclick="salvar()">Salvar</button>

  <p id="statusMsg"></p>

  <h3>Arquivos</h3>
  <div id="listaArquivos"></div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxtkJsDc3QlGJvGd9BdwSkK7KrS1ZDA2zaED8rmLZJD7KVaB2Ru32lAAFUGkO3x7KW7vg/exec";

let projetosPermitidos = [];
let indexEditando = null;

function chamarAPI(params, callback){

  const cb = "cb_" + Date.now();

  window[cb] = function(data){
    callback(data);
    delete window[cb];
  };

  const query = new URLSearchParams(params).toString();

  const script = document.createElement("script");
  script.src = `${API_URL}?${query}&callback=${cb}&nocache=${Date.now()}`;
  script.onload = () => script.remove();

  document.body.appendChild(script);
}

// LOGIN
function login(){

  chamarAPI({
    action:"login",
    usuario: usuario.value,
    senha: senha.value
  }, function(data){

    if(data.ok){

      projetosPermitidos = data.projetos;

      loginDiv.style.display="none";
      painelDiv.style.display="block";

      carregarProjetos();

    }else{
      loginMsg.innerText = data.erro;
    }

  });
}

// PROJETOS
function carregarProjetos(){

  projetoSelect.innerHTML = "";

  projetosPermitidos.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    projetoSelect.appendChild(opt);
  });

  carregarArquivos();
}

// LISTAR
function carregarArquivos(){

  const projeto = projetoSelect.value;

  chamarAPI({
    action:"listarArquivos",
    projeto
  }, function(data){

    listaArquivos.innerHTML = "";

    data.arquivos.forEach(a=>{

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <b>${a.nome}</b><br>
        ${a.fileid}<br>
        <button onclick="editar(${a.index}, '${a.nome}', '${a.fileid}', '${a.icone}')">Editar</button>
        <button onclick="deletar(${a.index})">Excluir</button>
      `;

      listaArquivos.appendChild(div);

    });

  });
}

// EDITAR
function editar(i,n,f,ic){

  indexEditando = i;

  nomeArquivo.value = n;
  fileId.value = f;
  icone.value = ic;
}

// SALVAR
function salvar(){

  const action = indexEditando !== null ? "atualizarArquivo" : "addArquivo";

  chamarAPI({
    action,
    projeto: projetoSelect.value,
    nome: nomeArquivo.value,
    fileid: fileId.value,
    icone: icone.value,
    index: indexEditando
  }, function(){

    statusMsg.innerText = "Salvo!";
    indexEditando = null;

    carregarArquivos();
  });
}

// DELETAR
function deletar(i){

  chamarAPI({
    action:"deletarArquivo",
    index:i
  }, function(){

    carregarArquivos();
  });
}
</script>

</body>
</html>
