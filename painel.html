<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwxJO2tgw06edGo4V_EdB-70myifizBzJzqXqk-zgqlv4glQriYkBTcy789wc5n8CxmCg/exec";

let usuarioLogado = null;
let projetosPermitidos = [];

// 🔹 LOGIN (GET)
async function login() {
  const user = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if (!user || !senha) {
    document.getElementById("loginMsg").innerText = "Preencha usuário e senha";
    return;
  }

  try {
    const url = `${API_URL}?action=login&usuario=${encodeURIComponent(user)}&senha=${encodeURIComponent(senha)}`;

    const res = await fetch(url);
    const data = await res.json();

    console.log("LOGIN:", data);

    if (data.ok) {
      usuarioLogado = user;
      projetosPermitidos = data.projetos || [];

      document.getElementById("loginDiv").style.display = "none";
      document.getElementById("painelDiv").style.display = "block";
      document.getElementById("loginMsg").innerText = "";

      preencherProjetos();
    } else {
      document.getElementById("loginMsg").innerText = data.erro || "Login inválido";
    }

  } catch (e) {
    console.error(e);
    document.getElementById("loginMsg").innerText = "Erro de conexão";
  }
}

// 🔹 PREENCHER PROJETOS
function preencherProjetos() {
  const select = document.getElementById("projetoSelect");
  select.innerHTML = "";

  projetosPermitidos.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });

  select.onchange = () => carregarProjeto(select.value);

  if (projetosPermitidos.length > 0) {
    carregarProjeto(projetosPermitidos[0]);
  }
}

// 🔹 CARREGAR PROJETO (GET)
async function carregarProjeto(id) {
  try {
    const url = `${API_URL}?action=getProjetoCompleto&id_projeto=${id}`;

    const res = await fetch(url);
    const data = await res.json();

    console.log("PROJETO:", data);

    if (!data.ok) return;

    const divLogo = document.getElementById("logoProjeto");
    divLogo.innerHTML = "";

    if (data.projeto.logo) {
      divLogo.innerHTML = `<img src="${data.projeto.logo}" />`;
    }

  } catch (e) {
    console.error(e);
  }
}

// 🔹 ADICIONAR ARQUIVO (GET)
async function adicionarArquivo() {
  const projeto = document.getElementById("projetoSelect").value;
  const nome = document.getElementById("nomeArquivo").value.trim();
  const link = document.getElementById("fileLink").value.trim();
  const icone = iconeSelecionado.class || "fas fa-file";

  if (!nome || !link) {
    document.getElementById("statusMsg").innerText = "Preencha Nome e Link!";
    return;
  }

  try {
    const url = `${API_URL}?action=addArquivo&projeto=${encodeURIComponent(projeto)}&nome=${encodeURIComponent(nome)}&link=${encodeURIComponent(link)}&icone=${encodeURIComponent(icone)}`;

    const res = await fetch(url);
    const data = await res.json();

    console.log("ADD:", data);

    if (data.ok) {
      document.getElementById("statusMsg").innerText = "Arquivo adicionado!";
      document.getElementById("nomeArquivo").value = "";
      document.getElementById("fileLink").value = "";

      iconeSelecionado = iconesDisponiveis[0];
      atualizarIconeSelecionado();
    } else {
      document.getElementById("statusMsg").innerText = data.erro || "Erro";
    }

  } catch (e) {
    console.error(e);
    document.getElementById("statusMsg").innerText = "Erro de conexão";
  }
}

// 🔹 LOGOUT
function logout() {
  usuarioLogado = null;
  projetosPermitidos = [];

  document.getElementById("loginDiv").style.display = "block";
  document.getElementById("painelDiv").style.display = "none";

  document.getElementById("loginMsg").innerText = "";
  document.getElementById("statusMsg").innerText = "";
  document.getElementById("logoProjeto").innerHTML = "";
}

// 🔹 INICIALIZA ÍCONES
montarIconeSelect();
</script>
