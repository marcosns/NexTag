<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel NexTag</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#111;
  color:#fff;
}

/* animação */
.fade{
  animation:fadeIn 0.4s ease;
}
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}

/* container */
.container{
  max-width:900px;
  margin:20px auto;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
}

/* logos */
.logo-main{
  display:block;
  margin:0 auto 10px;
  max-width:140px;
}

#logoProjeto{
  display:block;
  margin:10px auto 20px;
  max-height:70px;
}

/* topo */
.top{
  display:flex;
  justify-content:flex-end;
}

.logout{
  font-size:12px;
}

/* inputs */
input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

/* botões */
button{
  border:none;
  padding:8px 10px;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

button:hover{
  background:rgba(255,255,255,0.25);
}

/* tabela */
table{
  width:100%;
  margin-top:10px;
}

td{
  padding:10px;
  vertical-align:middle;
}

/* ações (BOTÕES RESPONSIVOS) */
.actions{
  display:flex;
  gap:5px;
  flex-wrap:nowrap;
}

.actions button{
  flex:1;
  padding:6px;
  font-size:14px;
}

/* modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#222;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

/* icones */
.icon-picker{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.icon-picker i{
  padding:10px;
  background:#333;
  border-radius:10px;
  cursor:pointer;
}

.icon-picker i.selected{
  background:#4CAF50;
}

.footer{
  text-align:center;
  margin-top:20px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container fade">

<!-- LOGIN -->
<div id="loginDiv">
<img class="logo-main" src="https://raw.githubusercontent.com/marcosns/NexTag/main/nextag_logo.png">
<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()" style="width:100%">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel" style="display:none;">

<div class="top">
  <button class="logout" onclick="logout()">Sair</button>
</div>

<img class="logo-main" src="https://raw.githubusercontent.com/marcosns/NexTag/main/nextag_logo.png">
<img id="logoProjeto">

<p id="descricao" style="text-align:center;"></p>

<p style="text-align:center;">Selecione o projeto</p>
<select id="projetoSelect" onchange="selecionarProjeto()"></select>

<div style="display:flex; justify-content:space-between; margin-top:20px;">
  <h3>Arquivos</h3>
  <button onclick="abrirModal()">+ Adicionar</button>
</div>

<table>
<tbody id="listaArquivos"></tbody>
</table>

</div>

<div class="footer">NexTag ©</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Novo arquivo</h3>

<input id="nomeArquivo" placeholder="Nome do arquivo">

<p>Selecione o ícone:</p>
<div class="icon-picker">
  <i class="fas fa-file" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-image" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-folder" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-phone" onclick="selecionarIcone(this)"></i>
</div>

<input id="fileLink" placeholder="Cole o link do arquivo">

<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby1bDZuXaD0rQTSPUMawKaeoB4l7sdrlAb9YXPq4xWaBo_Qn64_rUBRqAXzFanG37N_WQ/exec";

let projetosPermitidos = [];
let projetoAtual = null;
let iconeSelecionado = "fas fa-file";

function chamarAPI(params, callback){
  const cb = "cb_" + Date.now();
  const script = document.createElement("script");

  window[cb] = function(data){
    callback(data);
    delete window[cb];
    script.remove();
  };

  script.src = API_URL + "?" + new URLSearchParams(params) + "&callback=" + cb;
  document.body.appendChild(script);
}

/* LOGIN */
function login(){
  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  chamarAPI({action:"login",usuario,senha}, res=>{
    if(res.ok){

      projetosPermitidos = res.projetos;

      // 🔥 agora vem do usuário (PERFORMANCE)
      if(res.background){
        document.body.style.background = "url('" + res.background + "') center/cover no-repeat";
      }

      if(res.logo){
        document.getElementById("logoProjeto").src = res.logo;
      }

      localStorage.setItem("user", usuario);
      localStorage.setItem("projetos", JSON.stringify(res.projetos));
      localStorage.setItem("logo", res.logo || "");
      localStorage.setItem("bg", res.background || "");

      document.getElementById("loginDiv").style.display="none";
      document.getElementById("painel").style.display="block";

      carregarProjetos();
    } else {
      alert("Login inválido");
    }
  });
}

/* AUTO LOGIN */
window.onload = function(){
  const user = localStorage.getItem("user");
  const proj = localStorage.getItem("projetos");

  if(user && proj){
    projetosPermitidos = JSON.parse(proj);

    document.getElementById("loginDiv").style.display="none";
    document.getElementById("painel").style.display="block";

    const bg = localStorage.getItem("bg");
    const logo = localStorage.getItem("logo");

    if(bg){
      document.body.style.background = "url('" + bg + "') center/cover no-repeat";
    }

    if(logo){
      document.getElementById("logoProjeto").src = logo;
    }

    carregarProjetos();
  }
}

function logout(){
  localStorage.clear();
  location.reload();
}

/* PROJETOS */
function carregarProjetos(){
  chamarAPI({action:"getProjetos"}, res=>{
    const select = document.getElementById("projetoSelect");
    select.innerHTML="";

    res.projetos.forEach(p=>{
      if(projetosPermitidos.includes(String(p.id_projeto))){
        const opt = document.createElement("option");
        opt.value = p.id_projeto;
        opt.textContent = p.nome;
        select.appendChild(opt);
      }
    });

    selecionarProjeto();
  });
}

/* PROJETO */
function selecionarProjeto(){
  projetoAtual = document.getElementById("projetoSelect").value;
  carregarArquivos();
}

/* MODAL */
function abrirModal(){
  document.getElementById("modal").style.display="flex";
}
function fecharModal(){
  document.getElementById("modal").style.display="none";
}

/* ICONES */
function selecionarIcone(el){
  document.querySelectorAll(".icon-picker i").forEach(i=>i.classList.remove("selected"));
  el.classList.add("selected");
  iconeSelecionado = el.className;
}

/* ARQUIVOS */
function carregarArquivos(){
  chamarAPI({action:"getArquivos",projeto:projetoAtual}, res=>{
    const lista = document.getElementById("listaArquivos");
    lista.innerHTML="";

    res.arquivos.forEach(a=>{
      const tr = document.createElement("tr");

      tr.innerHTML =
        "<td><i class='" + a.icone + "'></i> " + a.nome + "</td>" +
        "<td class='actions'>" +
        "<button onclick='visualizarArquivo(" + JSON.stringify(a.link) + ")'><i class='fas fa-eye'></i></button>" +
        "<button onclick='editarArquivo(" + JSON.stringify(a.nome) + ")'><i class='fas fa-pen'></i></button>" +
        "<button onclick='downloadArquivo(" + JSON.stringify(a.link) + ")'><i class='fas fa-download'></i></button>" +
        "<button onclick='excluirArquivo(" + JSON.stringify(a.nome) + ")'><i class='fas fa-trash'></i></button>" +
        "<button onclick='verHistorico(" + JSON.stringify(a.nome) + ")'><i class='fas fa-clock'></i></button>" +
        "</td>";

      lista.appendChild(tr);
    });
  });
}

/* AÇÕES */
function salvar(){
  chamarAPI({
    action:"addArquivo",
    projeto:projetoAtual,
    nome:document.getElementById("nomeArquivo").value,
    link:document.getElementById("fileLink").value,
    icone:iconeSelecionado
  }, ()=>{
    fecharModal();
    carregarArquivos();
  });
}

function editarArquivo(nome){
  const novo = prompt("Novo link:");
  if(!novo) return;

  chamarAPI({action:"addArquivo",projeto:projetoAtual,nome,link:novo,icone:iconeSelecionado}, carregarArquivos);
}

function excluirArquivo(nome){
  if(confirm("Excluir?")){
    chamarAPI({action:"deleteArquivo",projeto:projetoAtual,nome}, carregarArquivos);
  }
}

function visualizarArquivo(link){
  window.open(link, "_blank");
}

function downloadArquivo(link){
  window.open(link, "_blank");
}

/* HISTÓRICO (placeholder pronto pra integrar no backend) */
function verHistorico(nome){
  alert("Histórico do arquivo: " + nome);
}
</script>

</body>
</html>
