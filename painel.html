<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel NexTag</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  width:90%;
  max-width:900px;
  margin:30px auto;
}

/* topo projeto */
.topo{
  text-align:center;
  margin-bottom:20px;
}

.topo img{
  max-width:150px;
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* icones */
.icones{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:10px 0;
}

.icone{
  padding:10px;
  border-radius:10px;
  background:#1e293b;
  cursor:pointer;
  text-align:center;
  width:80px;
}

.icone.selected{
  background:#2563eb;
}

button{
  padding:10px;
  width:100%;
  margin-top:10px;
}

/* tabela */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td, th{
  padding:10px;
  border-bottom:1px solid #333;
  text-align:left;
}

</style>
</head>

<body>

<div class="container">

  <div class="topo">
    <img id="logo">
    <h2 id="nomeProjeto"></h2>
    <p id="descricaoProjeto"></p>
  </div>

  <select id="projetoSelect" onchange="carregarTudo()"></select>

  <input id="nomeArquivo" placeholder="nome">
  <input id="fileId" placeholder="fileId do google drive">

  <div class="icones" id="icones"></div>

  <button onclick="salvar()">Salvar</button>

  <h3>Arquivos</h3>

  <table>
    <thead>
      <tr>
        <th></th>
        <th>Nome</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="listaArquivos"></tbody>
  </table>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxtkJsDc3QlGJvGd9BdwSkK7KrS1ZDA2zaED8rmLZJD7KVaB2Ru32lAAFUGkO3x7KW7vg/exec";

let projetosPermitidos = [];
let iconeSelecionado = "fas fa-file";
let indexEditando = null;

// 🔹 ÍCONES
const iconesDisponiveis = [
{class: "fas fa-file", label: "Arquivo"},
{class: "fas fa-file-pdf", label: "PDF"},
{class: "fas fa-image", label: "Imagem"},
{class: "fas fa-video", label: "Vídeo"},
{class: "fas fa-book", label: "Livro"},
{class: "fas fa-file-word", label: "Word"},
{class: "fas fa-file-excel", label: "Excel"},
{class: "fas fa-file-powerpoint", label: "PowerPoint"},
{class: "fas fa-download", label: "Download"},
{class: "fas fa-link", label: "Link"},
{class: "fas fa-folder", label: "Pasta"}
];

// JSONP
function chamarAPI(params, callback){

  const cb = "cb_" + Date.now();

  window[cb] = function(data){
    callback(data);
    delete window[cb];
  };

  const script = document.createElement("script");
  script.src = `${API_URL}?${new URLSearchParams(params)}&callback=${cb}&nocache=${Date.now()}`;
  script.onload = () => script.remove();

  document.body.appendChild(script);
}

// LOGIN automático simplificado (ajuste se quiser depois)
window.onload = () => {
  loginDireto();
  renderizarIcones();
};

// login direto (temporário)
function loginDireto(){
  chamarAPI({
    action:"login",
    usuario:"admin",
    senha:"123"
  }, function(data){

    projetosPermitidos = data.projetos;
    carregarProjetos();
  });
}

// carregar projetos
function carregarProjetos(){

  projetoSelect.innerHTML="";

  projetosPermitidos.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    projetoSelect.appendChild(opt);
  });

  carregarTudo();
}

// carregar tudo
function carregarTudo(){
  carregarProjetoInfo();
  carregarArquivos();
}

// 🔹 carregar dados do projeto
function carregarProjetoInfo(){

  chamarAPI({
    action:"getProjetoInfo",
    projeto: projetoSelect.value
  }, function(data){

    const p = data.projeto;

    document.body.style.backgroundImage = `url(${p.background})`;
    logo.src = p.logo;
    nomeProjeto.innerText = p.nome;
    descricaoProjeto.innerText = p.descricao;

  });
}

// 🔹 render ícones
function renderizarIcones(){

  icones.innerHTML = "";

  iconesDisponiveis.forEach(i=>{

    const div = document.createElement("div");
    div.className = "icone";
    div.innerHTML = `<i class="${i.class}"></i><br>${i.label}`;

    div.onclick = () => {
      document.querySelectorAll(".icone").forEach(el=>el.classList.remove("selected"));
      div.classList.add("selected");
      iconeSelecionado = i.class;
    };

    icones.appendChild(div);
  });

}

// 🔹 listar arquivos
function carregarArquivos(){

  chamarAPI({
    action:"listarArquivos",
    projeto: projetoSelect.value
  }, function(data){

    listaArquivos.innerHTML="";

    data.arquivos.forEach(a=>{

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td><input type="checkbox"></td>
        <td><i class="${a.icone}"></i> ${a.nome}</td>
        <td>
          <button onclick="editar(${a.index}, '${a.nome}', '${a.fileid}', '${a.icone}')">Editar</button>
          <button onclick="deletar(${a.index})">Excluir</button>
        </td>
      `;

      listaArquivos.appendChild(tr);
    });

  });
}

// editar
function editar(i,n,f,ic){

  indexEditando = i;

  nomeArquivo.value = n;
  fileId.value = f;
  iconeSelecionado = ic;
}

// salvar
function salvar(){

  const action = indexEditando !== null ? "atualizarArquivo" : "addArquivo";

  chamarAPI({
    action,
    projeto: projetoSelect.value,
    nome: nomeArquivo.value,
    fileid: fileId.value,
    icone: iconeSelecionado,
    index: indexEditando
  }, function(){

    indexEditando = null;
    carregarArquivos();
  });
}

// deletar
function deletar(i){

  chamarAPI({
    action:"deletarArquivo",
    index:i
  }, function(){
    carregarArquivos();
  });
}
</script>

</body>
</html>
