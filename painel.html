<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel NexTag</title>
</head>

<body style="background:#0f1b2a; color:#fff; font-family:Arial; display:flex; justify-content:center; align-items:center; height:100vh;">

<!-- LOGIN -->
<div id="loginDiv">
  <h2>Login</h2>
  <input id="usuario" placeholder="Usuário"><br><br>
  <input id="senha" type="password" placeholder="Senha"><br><br>
  <button onclick="login()">Entrar</button>
  <p id="loginMsg"></p>
</div>

<!-- PAINEL -->
<div id="painelDiv" style="display:none;">
  <h2>Painel</h2>

  <select id="projetoSelect"></select><br><br>

  <input id="nomeArquivo" placeholder="Nome"><br><br>
  <input id="fileLink" placeholder="Link"><br><br>

  <button onclick="salvar()">Salvar</button>

  <p id="statusMsg"></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxtkJsDc3QlGJvGd9BdwSkK7KrS1ZDA2zaED8rmLZJD7KVaB2Ru32lAAFUGkO3x7KW7vg/exec";

let projetosPermitidos = [];

function chamarAPI(params, callback){

  const callbackName = "cb_" + Date.now();

  window[callbackName] = function(data){
    console.log("RETORNO:", data);
    callback(data);
    delete window[callbackName];
  };

  const query = new URLSearchParams(params).toString();

  const script = document.createElement("script");
  script.src = `${API_URL}?${query}&callback=${callbackName}&nocache=${Date.now()}`;
  script.onload = () => script.remove();

  document.body.appendChild(script);
}

function login(){

  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  chamarAPI({
    action: "login",
    usuario,
    senha
  }, function(data){

    if(data.ok){
      projetosPermitidos = data.projetos;

      document.getElementById("loginDiv").style.display="none";
      document.getElementById("painelDiv").style.display="block";

      carregarProjetos();
    }else{
      document.getElementById("loginMsg").innerText = data.erro;
    }

  });
}

function carregarProjetos(){

  const select = document.getElementById("projetoSelect");
  select.innerHTML = "";

  projetosPermitidos.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });
}

function salvar(){

  const projeto = document.getElementById("projetoSelect").value;
  const nome = document.getElementById("nomeArquivo").value;
  const link = document.getElementById("fileLink").value;

  chamarAPI({
    action: "addArquivo",
    projeto,
    nome,
    link
  }, function(data){

    if(data.ok){
      document.getElementById("statusMsg").innerText = "Salvo!";
    }else{
      document.getElementById("statusMsg").innerText = data.erro;
    }

  });
}
</script>

</body>
</html>
