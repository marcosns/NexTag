<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0b1a2a,#122c44);
  color:white;
}

.card{
  max-width:900px;
  margin:40px auto;
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.icones{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.icone{
  width:55px;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background: rgba(255,255,255,0.1);
  cursor:pointer;
}

.icone.selected{
  background:#00c3ff;
}

.btn{
  padding:6px 10px;
  border-radius:8px;
  background: rgba(255,255,255,0.1);
  border:none;
  color:white;
  cursor:pointer;
}

table{
  width:100%;
  margin-top:20px;
}

td,th{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="card">

<h2>Painel</h2>

<select id="projetoSelect" onchange="carregarProjeto()"></select>

<input id="nomeArquivo" placeholder="Nome">
<input id="fileLink" placeholder="Link ou fileId">

<div class="icones" id="listaIcones"></div>

<button onclick="salvar()">Salvar</button>

<h3>Arquivos</h3>

<table>
<thead>
<tr>
<th></th>
<th>Nome</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaArquivos"></tbody>
</table>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;">
<div style="background:rgba(255,255,255,0.1);padding:20px;border-radius:15px;width:300px;">
<h3>Editar Link</h3>
<input id="novoLink">
<button onclick="confirmarEdicao()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>
</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz-V9McO0pde_wAApN4jGP959-WYCLe65rNXi0Dg0cUYITeJKD_MHPEbhPGghh4Eiwi7A/exec";

let usuarioLogado = prompt("Usuário:");
let projetos = [];
let arquivos = [];
let iconeSelecionado = "fas fa-file";
let arquivoEditando = null;

function chamarAPI(params, callback){
  const cb = "cb_"+Date.now();

  window[cb] = function(data){
    callback(data);
    delete window[cb];
  };

  const script = document.createElement("script");
  script.src = `${API_URL}?${new URLSearchParams(params)}&callback=${cb}&nocache=${Date.now()}`;
  document.body.appendChild(script);
}

const icones = ["fas fa-file","fas fa-file-pdf","fas fa-image","fas fa-video","fas fa-book"];

function montarIcones(){
  const div = document.getElementById("listaIcones");
  icones.forEach(i=>{
    const el = document.createElement("div");
    el.className="icone";
    el.innerHTML=`<i class="${i}"></i>`;
    el.onclick=()=>{
      document.querySelectorAll(".icone").forEach(x=>x.classList.remove("selected"));
      el.classList.add("selected");
      iconeSelecionado=i;
    };
    div.appendChild(el);
  });
}

function carregarProjetos(){
  chamarAPI({action:"getProjetos", usuario:usuarioLogado}, res=>{
    const sel = document.getElementById("projetoSelect");
    sel.innerHTML="";
    res.projetos.forEach(p=>{
      const o=document.createElement("option");
      o.value=p.id_projeto;
      o.textContent=p.nome;
      sel.appendChild(o);
    });
    carregarProjeto();
  });
}

function carregarProjeto(){
  const id = document.getElementById("projetoSelect").value;

  chamarAPI({action:"getArquivos", projeto:id}, res=>{
    arquivos = res.arquivos;
    renderTabela();
  });
}

function renderTabela(){
  const tb = document.getElementById("tabelaArquivos");
  tb.innerHTML="";

  arquivos.forEach((a,i)=>{
    tb.innerHTML += `
    <tr>
      <td><i class="fas fa-chevron-right"></i></td>
      <td><i class="${a.icone}"></i> ${a.nome}</td>
      <td>
        <button class="btn" onclick="editar(${i})">Editar</button>
        <button class="btn" onclick="download('${a.link}')">Download</button>
        <button class="btn" onclick="deletar(${i})">Excluir</button>
      </td>
    </tr>`;
  });
}

function salvar(){
  chamarAPI({
    action:"addArquivo",
    projeto:document.getElementById("projetoSelect").value,
    nome:document.getElementById("nomeArquivo").value,
    link:document.getElementById("fileLink").value,
    icone:iconeSelecionado
  }, ()=>carregarProjeto());
}

function deletar(i){
  const a = arquivos[i];
  chamarAPI({
    action:"deleteArquivo",
    projeto:document.getElementById("projetoSelect").value,
    nome:a.nome
  }, ()=>carregarProjeto());
}

function editar(i){
  arquivoEditando = arquivos[i];
  document.getElementById("modal").style.display="flex";
}

function confirmarEdicao(){
  chamarAPI({
    action:"addArquivo",
    projeto:document.getElementById("projetoSelect").value,
    nome:arquivoEditando.nome,
    link:document.getElementById("novoLink").value,
    icone:arquivoEditando.icone
  }, ()=>{
    fecharModal();
    carregarProjeto();
  });
}

function fecharModal(){
  document.getElementById("modal").style.display="none";
}

function download(link){
  window.open(link,"_blank");
}

montarIcones();
carregarProjetos();

</script>

</body>
</html>
