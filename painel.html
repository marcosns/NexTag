<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel NexTag</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}
.container{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}
input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
button{
  width:100%;
  padding:12px;
  background:#1e293b;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}
button:hover{background:#334155;}
h2,h3{margin-bottom:15px;}
p{margin-top:10px;}
</style>
</head>
<body>

<div class="container">
  <h2>Painel NexTag</h2>

  <!-- LOGIN -->
  <div id="loginDiv">
    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="loginMsg" style="color:red;"></p>
  </div>

  <!-- PAINEL DO CLIENTE -->
  <div id="painelDiv" style="display:none;">
    <h3>Adicionar Arquivo</h3>
    <label>Obra:</label>
    <select id="obraSelect"></select>
    <input type="text" id="nomeArquivo" placeholder="Nome do Arquivo">
    <input type="text" id="fileId" placeholder="ID do Google Drive">
    <input type="text" id="icone" placeholder="Ícone Font Awesome (ex: fas fa-book)">
    <button onclick="adicionarArquivo()">Salvar Arquivo</button>
    <p id="statusMsg" style="color:lightgreen;"></p>
    <button onclick="logout()">Sair</button>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyecdVMJgL508DIGiU5NHEkJvZDK4XX3K4yVPTjcq140UaabQccx-UvQss8hCKDCUZ-ZQ/exec"

// Variáveis de controle
let usuarioLogado = null
let obrasPermitidas = []

// FUNÇÃO DE LOGIN
async function login(){
  const user = document.getElementById("usuario").value
  const senha = document.getElementById("senha").value

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({action:"login", usuario:user, senha:senha})
  })
  const data = await res.json()

  if(data.ok){
    usuarioLogado = user
    obrasPermitidas = data.obras
    document.getElementById("loginDiv").style.display = "none"
    document.getElementById("painelDiv").style.display = "block"
    preencherObras()
    document.getElementById("statusMsg").innerText = ""
  } else {
    document.getElementById("loginMsg").innerText = "Usuário ou senha incorretos"
  }
}

// PREENCHE DROPDOWN DE OBRAS
function preencherObras(){
  const select = document.getElementById("obraSelect")
  select.innerHTML = ""
  obrasPermitidas.forEach(o=>{
    const opt = document.createElement("option")
    opt.value = o
    opt.innerText = o
    select.appendChild(opt)
  })
}

// FUNÇÃO PARA ADICIONAR ARQUIVO
async function adicionarArquivo(){
  const obra = document.getElementById("obraSelect").value
  const nome = document.getElementById("nomeArquivo").value
  const fileId = document.getElementById("fileId").value
  const icone = document.getElementById("icone").value || "fas fa-file"

  if(!nome || !fileId){
    document.getElementById("statusMsg").innerText = "Preencha Nome e FileId!"
    return
  }

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({action:"addArquivo", usuario:usuarioLogado, obra, nome, fileId, icone})
  })
  const data = await res.json()

  if(data.ok){
    document.getElementById("statusMsg").innerText = "Arquivo adicionado com sucesso!"
    // limpa campos
    document.getElementById("nomeArquivo").value=""
    document.getElementById("fileId").value=""
    document.getElementById("icone").value=""
  } else {
    document.getElementById("statusMsg").innerText = "Erro ao adicionar arquivo"
  }
}

// FUNÇÃO LOGOUT
function logout(){
  usuarioLogado = null
  obrasPermitidas = []
  document.getElementById("loginDiv").style.display = "block"
  document.getElementById("painelDiv").style.display = "none"
  document.getElementById("loginMsg").innerText = ""
  document.getElementById("statusMsg").innerText = ""
}
</script>

</body>
</html>
