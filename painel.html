<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://raw.githubusercontent.com/marcosns/NexTag/main/favicon.ico">
<title>Painel NexTag</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#111;
  color:#fff;
}

/* container */
.container{
  max-width:900px;
  margin:40px auto;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
}

/* logo principal */
.logo-main{
  display:block;
  margin:0 auto 20px;
  max-width:160px;
}

/* logo projeto */
#logoProjeto{
  display:block;
  margin:10px auto;
  max-height:80px;
}

/* inputs */
input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

/* botões */
button{
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

button:hover{
  background:rgba(255,255,255,0.25);
}

/* tabela */
table{
  width:100%;
  margin-top:20px;
}

td{
  padding:10px;
}

/* icones */
.icon-picker{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:10px 0;
}

.icon-picker i{
  font-size:18px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

.icon-picker i.selected{
  background:#4CAF50;
}

/* footer */
.footer{
  text-align:center;
  margin-top:20px;
  opacity:0.6;
}
</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginDiv">

<img class="logo-main" src="https://raw.githubusercontent.com/marcosns/NexTag/main/nextag_logo.png">

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()" style="width:100%">Entrar</button>

</div>

<!-- PAINEL -->
<div id="painel" style="display:none;">

<img class="logo-main" src="https://raw.githubusercontent.com/marcosns/NexTag/main/nextag_logo.png">

<img id="logoProjeto">
<p id="descricao"></p>

<input id="logoInput" placeholder="Link do logo do projeto">

<select id="projetoSelect" onchange="selecionarProjeto()"></select>

<input id="nomeArquivo" placeholder="Nome do arquivo">
<input id="fileLink" placeholder="Link do arquivo">

<!-- ÍCONES -->
<div class="icon-picker" id="icons">
  <i class="fas fa-file" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-image" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-folder" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-drafting-compass" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-phone" onclick="selecionarIcone(this)"></i>
</div>

<button onclick="salvar()" style="width:100%">Salvar</button>

<table>
  <tbody id="listaArquivos"></tbody>
</table>

</div>

<div class="footer">NexTag ©</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzdLInXybIFtJ2eiWO6vMyckTXA96rqzRKJGpb9aCfa19Ufaql79Kx5bPk2QVCpkUwukA/exec";

let projetosPermitidos = [];
let projetoAtual = null;
let iconeSelecionado = "fas fa-file";

// JSONP
function chamarAPI(params, callback){
  const cb = "cb_" + Date.now();
  const script = document.createElement("script");

  window[cb] = function(data){
    callback(data);
    delete window[cb];
    script.remove();
  };

  script.src = `${API_URL}?${new URLSearchParams(params)}&callback=${cb}`;
  document.body.appendChild(script);
}

// LOGIN
function login(){
  const usuarioInput = document.getElementById("usuario").value;
  const senhaInput = document.getElementById("senha").value;

  chamarAPI({
    action:"login",
    usuario: usuarioInput,
    senha: senhaInput
  }, function(res){

    if(res.ok){
      projetosPermitidos = res.projetos;

      document.getElementById("loginDiv").style.display = "none";
      document.getElementById("painel").style.display = "block";

      carregarProjetos();
    } else {
      alert("Login inválido");
    }

  });
}

// PROJETOS
function carregarProjetos(){
  chamarAPI({action:"getProjetos"}, res=>{
    projetoSelect.innerHTML="";

    res.projetos.forEach(p=>{
      if(projetosPermitidos.includes(String(p.id_projeto))){
        const opt = document.createElement("option");
        opt.value = p.id_projeto;
        opt.textContent = p.nome;
        projetoSelect.appendChild(opt);
      }
    });

    selecionarProjeto();
  });
}

// SELECIONAR
function selecionarProjeto(){
  projetoAtual = projetoSelect.value;

  chamarAPI({action:"getProjeto",id_projeto:projetoAtual}, res=>{
    const p = res.projeto;

    document.body.style.background = `url('${p.background}') center/cover no-repeat`;
    logoProjeto.src = p.logo;
    descricao.innerText = p.descricao;
    logoInput.value = p.logo;
  });

  carregarArquivos();
}

// ICONES
function selecionarIcone(el){
  document.querySelectorAll(".icon-picker i").forEach(i=>i.classList.remove("selected"));
  el.classList.add("selected");
  iconeSelecionado = el.className;
}

// ARQUIVOS
function carregarArquivos(){
  chamarAPI({action:"getArquivos",projeto:projetoAtual}, res=>{
    listaArquivos.innerHTML="";

    res.arquivos.forEach(a=>{
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td><i class="${a.icone}"></i> ${a.nome}</td>
        <td>
          <button onclick='editarArquivo(${JSON.stringify(a.nome)})'>✏️</button>
          <button onclick='window.open(${JSON.stringify(a.link)})'>⬇️</button>
          <button onclick='excluirArquivo(${JSON.stringify(a.nome)})'>🗑️</button>
        </td>
      `;

      listaArquivos.appendChild(tr);
    });
  });
}

// SALVAR
function salvar(){
  chamarAPI({
    action:"addArquivo",
    projeto:projetoAtual,
    nome:nomeArquivo.value,
    link:fileLink.value,
    icone:iconeSelecionado
  }, ()=>{
    carregarArquivos();
  });
}

// EDITAR
function editarArquivo(nome){
  const novo = prompt("Novo link:");
  if(!novo) return;

  chamarAPI({action:"addArquivo",projeto:projetoAtual,nome,link:novo,icone:iconeSelecionado}, carregarArquivos);
}

// EXCLUIR
function excluirArquivo(nome){
  if(confirm("Excluir?")){
    chamarAPI({action:"deleteArquivo",projeto:projetoAtual,nome}, carregarArquivos);
  }
}
</script>

</body>
</html>
