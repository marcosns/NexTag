<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel NexTag</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0b1a2a,#122c44);
  color:#fff;
}

/* glass */
.card{
  max-width:900px;
  margin:40px auto;
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

/* inputs */
input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

/* botão */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

/* icones */
.icones{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:10px 0;
}

.icone{
  width:55px;
  height:55px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  cursor:pointer;
  background: rgba(255,255,255,0.1);
  transition:0.2s;
}

.icone:hover{
  background: rgba(255,255,255,0.2);
}

.icone.selected{
  background:#00c3ff;
}

/* tabela */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.btn{
  padding:6px 10px;
  margin:2px;
  border-radius:6px;
  cursor:pointer;
}
.edit{background:#ffc107}
.del{background:#dc3545;color:#fff}

/* header projeto */
.headerProjeto{
  text-align:center;
  margin-bottom:20px;
}

.headerProjeto img{
  max-height:80px;
}

</style>
</head>

<body>

<div class="card">

<div class="headerProjeto">
  <img id="logoProjeto">
  <p id="descProjeto"></p>
</div>

<h2>Painel</h2>

<select id="projetoSelect" onchange="carregarProjeto()"></select>

<input id="nomeArquivo" placeholder="Nome do arquivo">
<input id="fileLink" placeholder="File ID do Google Drive">

<div class="icones" id="listaIcones"></div>

<button onclick="salvar()">Salvar</button>

<h3>Arquivos</h3>

<table>
<thead>
<tr>
<th></th>
<th>Nome</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaArquivos"></tbody>
</table>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzXFtkNNmBUAo5ReSaTu9ErL4zzOxpj3APlKH4tHf_9rT6e8BcqWJPjnavvgkdPgilcIQ/exec";

let projetos = [];
let arquivos = [];
let iconeSelecionado = "fas fa-file";

/* API */
function chamarAPI(params, callback){
  const cb = "cb_"+Date.now();

  window[cb] = function(data){
    callback(data);
    delete window[cb];
  };

  const script = document.createElement("script");
  script.src = `${API_URL}?${new URLSearchParams(params)}&callback=${cb}&nocache=${Date.now()}`;
  document.body.appendChild(script);
}

/* ICONE */
const icones = [
"fas fa-file",
"fas fa-file-pdf",
"fas fa-image",
"fas fa-video",
"fas fa-book",
"fas fa-file-word",
"fas fa-file-excel",
"fas fa-file-powerpoint",
"fas fa-download",
"fas fa-link",
"fas fa-folder"
];

function montarIcones(){
  const div = document.getElementById("listaIcones");
  div.innerHTML="";

  icones.forEach(i=>{
    const el = document.createElement("div");
    el.className="icone";
    el.innerHTML=`<i class="${i}"></i>`;

    el.onclick=()=>{
      document.querySelectorAll(".icone").forEach(x=>x.classList.remove("selected"));
      el.classList.add("selected");
      iconeSelecionado = i;
    }

    div.appendChild(el);
  });
}

/* CARREGAR PROJETOS */
function carregarProjetos(){
  chamarAPI({action:"getProjetos"}, res=>{
    projetos = res.projetos || [];

    const sel = document.getElementById("projetoSelect");
    sel.innerHTML="";

    projetos.forEach(p=>{
      const opt = document.createElement("option");
      opt.value = p.id_projeto;
      opt.textContent = p.nome;
      sel.appendChild(opt);
    });

    if(projetos.length){
      carregarProjeto();
    }
  });
}

/* CARREGAR PROJETO */
function carregarProjeto(){
  const id = document.getElementById("projetoSelect").value;

  chamarAPI({action:"getProjeto", id_projeto:id}, res=>{
    const p = res.projeto;

    document.getElementById("logoProjeto").src = p.logo;
    document.getElementById("descProjeto").innerText = p.descricao;

    document.body.style.background = p.background || "#0b1a2a";
  });

  chamarAPI({action:"getArquivos", projeto:id}, res=>{
    arquivos = res.arquivos || [];
    renderTabela();
  });
}

/* TABELA */
function renderTabela(){
  const tb = document.getElementById("tabelaArquivos");
  tb.innerHTML="";

  arquivos.forEach((a,i)=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input type="checkbox"></td>
      <td><i class="${a.icone}"></i> ${a.nome}</td>
      <td>
        <button class="btn edit" onclick="editar(${i})">Editar</button>
        <button class="btn del" onclick="deletar(${i})">Excluir</button>
      </td>
    `;

    tb.appendChild(tr);
  });
}

/* EDITAR */
function editar(i){
  const a = arquivos[i];

  document.getElementById("nomeArquivo").value = a.nome;
  document.getElementById("fileLink").value = a.fileId;
  iconeSelecionado = a.icone;
}

/* DELETAR */
function deletar(i){
  const a = arquivos[i];

  chamarAPI({
    action:"deleteArquivo",
    projeto:document.getElementById("projetoSelect").value,
    nome:a.nome
  },()=>{
    carregarProjeto();
  });
}

/* SALVAR */
function salvar(){
  chamarAPI({
    action:"addArquivo",
    projeto:document.getElementById("projetoSelect").value,
    nome:document.getElementById("nomeArquivo").value,
    link:document.getElementById("fileLink").value,
    icone:iconeSelecionado
  },()=>{
    carregarProjeto();
  });
}

/* INIT */
montarIcones();
carregarProjetos();

</script>

</body>
</html>
