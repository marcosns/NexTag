<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Painel NexTag</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
body {
  font-family: 'Inter', sans-serif;
  background: url('fundo6.jpg') no-repeat center/cover;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 400px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  text-align: center;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  background: #1e293b;
  color: white;
  cursor: pointer;
  font-weight: 600;
}

button:hover {
  background: #334155;
}

h2, h3 {
  margin-bottom: 15px;
}

p {
  margin-top: 10px;
}

/* Logo do projeto */
#logoProjeto img {
  max-width: 140px;
  max-height: 80px;
  object-fit: contain;
  margin-bottom: 20px;
}

/* Seletor customizado de ícones */

.icon-select-wrapper {
  position: relative;
  user-select: none;
  margin-top: 8px;
}

.icon-select-selected {
  background-color: #222c3b;
  color: white;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.icon-select-selected i {
  font-size: 18px;
  margin-right: 10px;
}

.icon-select-arrow {
  border: solid white;
  border-width: 0 2px 2px 0;
  padding: 4px;
  transform: rotate(45deg);
  -webkit-transform: rotate(45deg);
  margin-left: auto;
  transition: transform 0.3s ease;
}

.icon-select-arrow.open {
  transform: rotate(-135deg);
}

.icon-select-items {
  position: absolute;
  background-color: #222c3b;
  top: 100%;
  left: 0;
  right: 0;
  max-height: 200px;
  overflow-y: auto;
  border-radius: 0 0 8px 8px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.3);
  z-index: 1000;
  display: none;
}

.icon-select-items div {
  padding: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  color: white;
}

.icon-select-items div i {
  font-size: 18px;
  margin-right: 10px;
}

.icon-select-items div:hover {
  background-color: #334155;
}
</style>
</head>
<body>

<div class="container">

  <div id="logoProjeto"></div>

  <h2>Painel NexTag</h2>

  <!-- LOGIN -->
  <div id="loginDiv">
    <input type="text" id="usuario" placeholder="Usuário" autocomplete="username" />
    <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" />
    <button onclick="login()">Entrar</button>
    <p id="loginMsg" style="color:red;"></p>
  </div>

  <!-- PAINEL DO CLIENTE -->
  <div id="painelDiv" style="display:none;">
    <h3>Adicionar Arquivo</h3>
    <label>Projeto:</label>
    <select id="projetoSelect"></select>

    <input type="text" id="nomeArquivo" placeholder="Nome do Arquivo" />

    <input type="text" id="fileLink" placeholder="Link completo (Drive, OneDrive, SharePoint)" />

    <label>Ícone Font Awesome:</label>

    <!-- Seletor customizado -->
    <div class="icon-select-wrapper" id="iconeSelectWrapper">
      <div class="icon-select-selected" tabindex="0">
        <i class="fas fa-file"></i> <span>Arquivo Padrão</span>
        <span class="icon-select-arrow"></span>
      </div>
      <div class="icon-select-items">
        <!-- itens serão gerados via JS -->
      </div>
    </div>

    <button onclick="adicionarArquivo()">Salvar Arquivo</button>
    <p id="statusMsg" style="color:lightgreen;"></p>
    <button onclick="logout()">Sair</button>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx9ooJfJZb21z0kHPYoNeET-JyXgeasBb2nh_0fP1pImIIAB_3nMSIC_QrK9_WhIF9MqQ/exec";

// Variáveis de controle
let usuarioLogado = null;
let projetosPermitidos = [];

// Lista de ícones que vamos mostrar (classe FA e nome amigável)
const iconesDisponiveis = [
 {class: "fas fa-file", label: "Arquivo Padrão"},
 {class: "fas fa-file-pdf", label: "PDF"},
 {class: "fas fa-image", label: "Imagem"},
 {class: "fas fa-video", label: "Vídeo"},
 {class: "fas fa-music", label: "Música"},
 {class: "fas fa-book", label: "Livro"},
 {class: "fas fa-file-word", label: "Word"},
 {class: "fas fa-file-excel", label: "Excel"},
 {class: "fas fa-file-powerpoint", label: "PowerPoint"},
 {class: "fas fa-download", label: "Download"},
 {class: "fas fa-link", label: "Link"},
 {class: "fas fa-folder", label: "Pasta"},
 {class: "fas fa-rocket", label: "Foguete"},
 {class: "fas fa-address-book", label: "Endereço"},
 {class: "fas fa-telegram", label: "Telegram"},
 {class: "fas fa-vcard-o", label: "Vcard-O"},
 {class: "fas fa-area-chart", label: "Area-Chart"},
 {class: "fas fa-book", label: "Book"},
 {class: "fas fa-building", label: "Building"},
 {class: "fas fa-calendar", label: "Calendar"},
 {class: "fas fa-check", label: "Check"},
 {class: "fas fa-calendar", label: "Calendar"},
 {class: "fas fa-comments", label: "Comments"},
 {class: "fas fa-file-zip-o", label: "File-Zip-O"},
 {class: "fas fa-home", label: "Home"},
 {class: "fas fa-info", label: "Info"},
 {class: "fas fa-map", label: "Map"},
 {class: "fas fa-object-group", label: "Object-Group"},
 {class: "fas fa-object-ungroup", label: "Object-Ungroup"},
 {class: "fas fa-phone", label: "Phone"},
 {class: "fas fa-taxi", label: "Taxi"},
 {class: "fas fa-file-o", label: "File-O"},
 {class: "fas fa-file-text", label: "File-Text"},
 {class: "fas fa-file-archive-o", label: "File-Archive-O"},
 {class: "fas fa-autocad", label: "Autocad"},
 {class: "fas fa-skeetchup", label: "Skeetchup"},
  
];

// Para armazenar ícone selecionado
let iconeSelecionado = iconesDisponiveis[0];

// Montar seletor customizado
function montarIconeSelect() {
  const wrapper = document.getElementById("iconeSelectWrapper");
  const selected = wrapper.querySelector(".icon-select-selected");
  const itemsContainer = wrapper.querySelector(".icon-select-items");

  // Criar opções
  itemsContainer.innerHTML = "";
  iconesDisponiveis.forEach((ico, i) => {
    const div = document.createElement("div");
    div.setAttribute("data-class", ico.class);
    div.setAttribute("tabindex", "0");
    div.innerHTML = `<i class="${ico.class}"></i> <span>${ico.label}</span>`;
    div.addEventListener("click", () => {
      iconeSelecionado = ico;
      atualizarIconeSelecionado();
      fecharDropdown();
    });
    div.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        div.click();
      }
    });
    itemsContainer.appendChild(div);
  });

  // Toggle dropdown
  selected.onclick = () => {
    if (itemsContainer.style.display === "block") {
      fecharDropdown();
    } else {
      abrirDropdown();
    }
  };

  // Fechar ao clicar fora
  document.addEventListener("click", (e) => {
    if (!wrapper.contains(e.target)) {
      fecharDropdown();
    }
  });

  // Acessibilidade com teclado
  selected.onkeydown = (e) => {
    if (e.key === "ArrowDown" || e.key === " ") {
      e.preventDefault();
      abrirDropdown();
      const firstItem = itemsContainer.querySelector("div");
      if (firstItem) firstItem.focus();
    }
  };

  itemsContainer.onkeydown = (e) => {
    const focusable = Array.from(itemsContainer.querySelectorAll("div"));
    const currentIndex = focusable.indexOf(document.activeElement);
    if (e.key === "ArrowDown") {
      e.preventDefault();
      let next = (currentIndex + 1) % focusable.length;
      focusable[next].focus();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      let prev = (currentIndex - 1 + focusable.length) % focusable.length;
      focusable[prev].focus();
    } else if (e.key === "Escape") {
      fecharDropdown();
      selected.focus();
    }
  };

  atualizarIconeSelecionado();
}

function atualizarIconeSelecionado() {
  const wrapper = document.getElementById("iconeSelectWrapper");
  const selected = wrapper.querySelector(".icon-select-selected");
  const arrow = wrapper.querySelector(".icon-select-arrow");
  selected.innerHTML = `<i class="${iconeSelecionado.class}"></i> <span>${iconeSelecionado.label}</span>`;
  selected.appendChild(arrow);
}

function abrirDropdown() {
  const wrapper = document.getElementById("iconeSelectWrapper");
  const itemsContainer = wrapper.querySelector(".icon-select-items");
  const arrow = wrapper.querySelector(".icon-select-arrow");
  itemsContainer.style.display = "block";
  arrow.classList.add("open");
}

function fecharDropdown() {
  const wrapper = document.getElementById("iconeSelectWrapper");
  const itemsContainer = wrapper.querySelector(".icon-select-items");
  const arrow = wrapper.querySelector(".icon-select-arrow");
  itemsContainer.style.display = "none";
  arrow.classList.remove("open");
}

// FUNÇÃO DE LOGIN
async function login() {
  const user = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if (!user || !senha) {
    document.getElementById("loginMsg").innerText = "Preencha usuário e senha";
    return;
  }

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "login", usuario: user, senha: senha }),
  });
  const data = await res.json();

  if (data.ok) {
    usuarioLogado = user;
    projetosPermitidos = data.projetos;
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("painelDiv").style.display = "block";
    document.getElementById("loginMsg").innerText = "";
    preencherProjetos();
  } else {
    document.getElementById("loginMsg").innerText = "Usuário ou senha incorretos";
  }
}

// PREENCHER DROPDOWN DE PROJETOS E CARREGAR LOGO AO MUDAR SELEÇÃO
function preencherProjetos() {
  const select = document.getElementById("projetoSelect");
  select.innerHTML = "";

  projetosPermitidos.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });

  // Quando trocar projeto, carregar dados (logo)
  select.onchange = () => {
    carregarProjeto(select.value);
  };

  if (projetosPermitidos.length > 0) {
    carregarProjeto(projetosPermitidos[0]);
  }
}

// Carregar dados do projeto (logo)
async function carregarProjeto(id) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "getProjetoCompleto", id_projeto: id }),
  });

  const data = await res.json();

  if (!data.ok) return;

  const divLogo = document.getElementById("logoProjeto");
  divLogo.innerHTML = "";

  if (data.projeto.logo) {
    divLogo.innerHTML = `<img src="${data.projeto.logo}" alt="Logo do Projeto" />`;
  }
}

// FUNÇÃO PARA ADICIONAR ARQUIVO
async function adicionarArquivo() {
  const projeto = document.getElementById("projetoSelect").value;
  const nome = document.getElementById("nomeArquivo").value.trim();
  const link = document.getElementById("fileLink").value.trim();
  const icone = iconeSelecionado.class || "fas fa-file";

  if (!nome || !link) {
    document.getElementById("statusMsg").innerText = "Preencha Nome e Link!";
    return;
  }

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "addArquivo", usuario: usuarioLogado, projeto, nome, link, icone }),
  });

  const data = await res.json();

  if (data.ok) {
    document.getElementById("statusMsg").innerText = "Arquivo adicionado com sucesso!";
    document.getElementById("nomeArquivo").value = "";
    document.getElementById("fileLink").value = "";
    iconeSelecionado = iconesDisponiveis[0];
    atualizarIconeSelecionado();
  } else {
    document.getElementById("statusMsg").innerText = "Erro ao adicionar arquivo";
  }
}

// FUNÇÃO LOGOUT
function logout() {
  usuarioLogado = null;
  projetosPermitidos = [];
  document.getElementById("loginDiv").style.display = "block";
  document.getElementById("painelDiv").style.display = "none";
  document.getElementById("loginMsg").innerText = "";
  document.getElementById("statusMsg").innerText = "";
  document.getElementById("logoProjeto").innerHTML = "";
}

montarIconeSelect();
</script>

</body>
</html>
