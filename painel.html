<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxtkJsDc3QlGJvGd9BdwSkK7KrS1ZDA2zaED8rmLZJD7KVaB2Ru32lAAFUGkO3x7KW7vg/exec";

let projetosPermitidos = [];

// ✅ JSONP (CORRIGIDO + NO CACHE)
function chamarAPI(params, callback){

  const callbackName = "cb_" + Date.now();

  window[callbackName] = function(data){
    console.log("RETORNO:", data);
    callback(data);
    delete window[callbackName];
  };

  const query = new URLSearchParams(params).toString();

  const script = document.createElement("script");

  // 🔥 evita cache + resolve tela branca
  script.src = `${API_URL}?${query}&callback=${callbackName}&nocache=${Date.now()}`;

  // 🔥 remove script depois de usar
  script.onload = () => script.remove();

  document.body.appendChild(script);
}

// ✅ LOGIN
function login(){

  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  chamarAPI({
    action: "login",
    usuario,
    senha
  }, function(data){

    if(data.ok){
      projetosPermitidos = data.projetos;

      document.getElementById("loginDiv").style.display="none";
      document.getElementById("painelDiv").style.display="block";

      carregarProjetos();
    }else{
      document.getElementById("loginMsg").innerText = data.erro;
    }

  });
}

// ✅ CARREGAR PROJETOS
function carregarProjetos(){

  const select = document.getElementById("projetoSelect");
  select.innerHTML = "";

  projetosPermitidos.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });
}

// ✅ SALVAR
function salvar(){

  const projeto = document.getElementById("projetoSelect").value;
  const nome = document.getElementById("nomeArquivo").value;
  const link = document.getElementById("fileLink").value;

  chamarAPI({
    action: "addArquivo",
    projeto,
    nome,
    link
  }, function(data){

    if(data.ok){
      document.getElementById("statusMsg").innerText = "Salvo!";
    }else{
      document.getElementById("statusMsg").innerText = data.erro;
    }

  });
}
</script>
