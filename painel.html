<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Painel NexTag</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
body {
  font-family: 'Inter', sans-serif;
  background: url('fundo6.jpg') no-repeat center/cover;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 400px;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  text-align: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #1e293b;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  font-weight: 600;
  font-size: 16px;
}

button:hover {
  background: #334155;
}

h2, h3 {
  margin-bottom: 15px;
}

p {
  margin-top: 10px;
}

/* Logo do projeto */
#logoProjeto img {
  max-width: 140px;
  max-height: 80px;
  object-fit: contain;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="container">

  <div id="seulogo.png"></div>

  <h2>Painel NexTag</h2>

  <!-- LOGIN -->
  <div id="loginDiv">
    <input type="text" id="usuario" placeholder="Usuário" autocomplete="username" />
    <input type="password" id="senha" placeholder="Senha" autocomplete="current-password" />
    <button onclick="login()">Entrar</button>
    <p id="loginMsg" style="color:red;"></p>
  </div>

  <!-- PAINEL DO CLIENTE -->
  <div id="painelDiv" style="display:none;">
    <h3>Adicionar Arquivo</h3>
    <label>Projeto:</label>
    <select id="projetoSelect"></select>

    <input type="text" id="nomeArquivo" placeholder="Nome do Arquivo" />

    <input type="text" id="fileLink" placeholder="Link completo (Drive, OneDrive, SharePoint)" />

    <label>Ícone Font Awesome:</label>
    <select id="iconeSelect">
      <option value="fas fa-file">Arquivo Padrão</option>
      <option value="fas fa-file-pdf">PDF</option>
      <option value="fas fa-image">Imagem</option>
      <option value="fas fa-video">Vídeo</option>
      <option value="fas fa-music">Música</option>
      <option value="fas fa-book">Livro</option>
      <option value="fas fa-file-word">Word</option>
      <option value="fas fa-file-excel">Excel</option>
      <option value="fas fa-file-powerpoint">PowerPoint</option>
      <option value="fas fa-download">Download</option>
      <option value="fas fa-link">Link</option>
      <option value="fas fa-folder">Pasta</option>
      <option value="fas fa-rocket">rocket</option>
      <option value="fas fa-ship">ship</option>
    </select>

    <button onclick="adicionarArquivo()">Salvar Arquivo</button>
    <p id="statusMsg" style="color:lightgreen;"></p>
    <button onclick="logout()">Sair</button>
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx9ooJfJZb21z0kHPYoNeET-JyXgeasBb2nh_0fP1pImIIAB_3nMSIC_QrK9_WhIF9MqQ/exec";

// Variáveis de controle
let usuarioLogado = null;
let projetosPermitidos = [];

// FUNÇÃO DE LOGIN
async function login() {
  const user = document.getElementById("usuario").value.trim();
  const senha = document.getElementById("senha").value.trim();

  if (!user || !senha) {
    document.getElementById("loginMsg").innerText = "Preencha usuário e senha";
    return;
  }

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "login", usuario: user, senha: senha }),
  });
  const data = await res.json();

  if (data.ok) {
    usuarioLogado = user;
    projetosPermitidos = data.projetos;
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("painelDiv").style.display = "block";
    document.getElementById("loginMsg").innerText = "";
    preencherProjetos();
  } else {
    document.getElementById("loginMsg").innerText = "Usuário ou senha incorretos";
  }
}

// PREENCHER DROPDOWN DE PROJETOS E CARREGAR LOGO AO MUDAR SELEÇÃO
function preencherProjetos() {
  const select = document.getElementById("projetoSelect");
  select.innerHTML = "";

  projetosPermitidos.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });

  // Quando trocar projeto, carregar dados (logo)
  select.onchange = () => {
    carregarProjeto(select.value);
  };

  if (projetosPermitidos.length > 0) {
    carregarProjeto(projetosPermitidos[0]);
  }
}

// Carregar dados do projeto (logo)
async function carregarProjeto(id) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "getProjetoCompleto", id_projeto: id }),
  });

  const data = await res.json();

  if (!data.ok) return;

  const divLogo = document.getElementById("logoProjeto");
  divLogo.innerHTML = "";

  if (data.projeto.logo) {
    divLogo.innerHTML = `<img src="${data.projeto.logo}" alt="Logo do Projeto" />`;
  }
}

// FUNÇÃO PARA ADICIONAR ARQUIVO
async function adicionarArquivo() {
  const projeto = document.getElementById("projetoSelect").value;
  const nome = document.getElementById("nomeArquivo").value.trim();
  const link = document.getElementById("fileLink").value.trim();
  const icone = document.getElementById("iconeSelect").value || "fas fa-file";

  if (!nome || !link) {
    document.getElementById("statusMsg").innerText = "Preencha Nome e Link!";
    return;
  }

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "addArquivo", usuario: usuarioLogado, projeto, nome, link, icone }),
  });

  const data = await res.json();

  if (data.ok) {
    document.getElementById("statusMsg").innerText = "Arquivo adicionado com sucesso!";
    document.getElementById("nomeArquivo").value = "";
    document.getElementById("fileLink").value = "";
    // Reseta para ícone padrão
    document.getElementById("iconeSelect").value = "fas fa-file";
  } else {
    document.getElementById("statusMsg").innerText = "Erro ao adicionar arquivo";
  }
}

// FUNÇÃO LOGOUT
function logout() {
  usuarioLogado = null;
  projetosPermitidos = [];
  document.getElementById("loginDiv").style.display = "block";
  document.getElementById("painelDiv").style.display = "none";
  document.getElementById("loginMsg").innerText = "";
  document.getElementById("statusMsg").innerText = "";
  document.getElementById("logoProjeto").innerHTML = "";
}
</script>

</body>
</html>
