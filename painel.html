<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx3MB7aKjrvDpcg3h7p4bkvsoZ4TcGoH_ihW5YFBbgvPaSQy7F3egms4mXU_BJFoDd5Bw/exec";

let projetosPermitidos = [];

// 🔹 JSONP CALL
function chamarAPI(params, callbackName){

  const script = document.createElement("script");

  const query = new URLSearchParams(params).toString();

  script.src = `${API_URL}?${query}&callback=${callbackName}`;

  document.body.appendChild(script);
}

function login(){

  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  const callbackName = "cb_login_" + Date.now();

  window[callbackName] = function(data){

    if(data.ok){
      projetosPermitidos = data.projetos;

      document.getElementById("loginDiv").style.display="none";
      document.getElementById("painelDiv").style.display="block";

      carregarProjetos();
    }else{
      document.getElementById("loginMsg").innerText = data.erro;
    }

    delete window[callbackName];
  };

  const script = document.createElement("script");
  script.src = `${API_URL}?action=login&usuario=${encodeURIComponent(usuario)}&senha=${encodeURIComponent(senha)}&callback=${callbackName}`;

  document.body.appendChild(script);
}

// 🔹 CALLBACK LOGIN
function respostaLogin(data){

  if(data.ok){
    projetosPermitidos = data.projetos;

    document.getElementById("loginDiv").style.display="none";
    document.getElementById("painelDiv").style.display="block";

    carregarProjetos();
  }else{
    document.getElementById("loginMsg").innerText = data.erro;
  }
}

// 🔹 carregar projetos
function carregarProjetos(){

  const select = document.getElementById("projetoSelect");
  select.innerHTML="";

  projetosPermitidos.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p;
    opt.innerText = p;
    select.appendChild(opt);
  });
}

// 🔹 SALVAR
function salvar(){

  const projeto = document.getElementById("projetoSelect").value;
  const nome = document.getElementById("nomeArquivo").value;
  const link = document.getElementById("fileLink").value;

  const callbackName = "cb_save_" + Date.now();

  window[callbackName] = function(data){

    if(data.ok){
      document.getElementById("statusMsg").innerText="Salvo!";
    }else{
      document.getElementById("statusMsg").innerText=data.erro;
    }

    delete window[callbackName];
  };

  const script = document.createElement("script");
  script.src = `${API_URL}?action=addArquivo&projeto=${encodeURIComponent(projeto)}&nome=${encodeURIComponent(nome)}&link=${encodeURIComponent(link)}&callback=${callbackName}`;

  document.body.appendChild(script);
}

// 🔹 CALLBACK SALVAR
function respostaSalvar(data){

  if(data.ok){
    document.getElementById("statusMsg").innerText="Salvo!";
  }else{
    document.getElementById("statusMsg").innerText=data.erro;
  }
}
</script>
