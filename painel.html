<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FAVICON -->
<link rel="icon" href="https://raw.githubusercontent.com/marcosns/NexTag/main/favicon.ico">

<title>Painel NexTag</title>

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f5f5f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* LOGIN */
.login-box{
  background:#fff;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  width:320px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#f2f2f2;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:white;
  font-weight:500;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

/* PAINEL */
.container{
  display:none;
  width:900px;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

.top{
  text-align:center;
  margin-bottom:20px;
}

.top img{
  max-width:120px;
}

/* SELECT */
select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#f2f2f2;
  margin-bottom:10px;
}

/* FORM */
.form{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.form input{
  flex:1;
}

/* LISTA */
table{
  width:100%;
}

td{
  padding:10px;
}

.btn{
  background:#e5e5ea;
  border:none;
  padding:8px;
  border-radius:8px;
  margin:2px;
  cursor:pointer;
}

.btn:hover{
  background:#d1d1d6;
}

/* RODAPÉ */
.footer{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  color:#888;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginDiv" class="login-box">
  <h2 style="text-align:center;">Acesso</h2>

  <input id="usuario" placeholder="E-mail">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painelDiv" class="container">

  <div class="top">
    <img id="logo">
    <p id="descricao"></p>
  </div>

  <select id="projetoSelect" onchange="selecionarProjeto()"></select>

  <div class="form">
    <input id="nomeArquivo" placeholder="Nome">
    <input id="fileLink" placeholder="Link">
    <button onclick="salvar()">+</button>
  </div>

  <table>
    <tbody id="listaArquivos"></tbody>
  </table>

  <div class="footer">
    Sistema de propriedade da NexTag
  </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwwcClQMs1loW2CGJuM_ObJzY3h8XLvz1ZclG4gDlxiEOQiU6oHN5hcZvdbo9NG78U9-A/exec";

let projetosPermitidos = [];
let projetoAtual = null;
let iconeSelecionado = "fas fa-file";

// JSONP
function chamarAPI(params, callback){
  const cb = "cb_" + Date.now();

  window[cb] = function(data){
    console.log("RET:", data);
    callback(data);
    delete window[cb];
  };

  const script = document.createElement("script");
  script.src = `${API_URL}?${new URLSearchParams(params)}&callback=${cb}&nocache=${Date.now()}`;
  document.body.appendChild(script);
}

// LOGIN
function login(){
  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  chamarAPI({action:"login",usuario,senha}, function(res){

    if(res.ok){

      projetosPermitidos = res.projetos;

      document.getElementById("loginDiv").style.display="none";
      document.getElementById("painelDiv").style.display="block";

      carregarProjetos();

    }else{
      alert("Login inválido");
    }
  });
}

// PROJETOS
function carregarProjetos(){
  chamarAPI({action:"getProjetos"}, function(res){

    const select = document.getElementById("projetoSelect");
    select.innerHTML = "";

    res.projetos.forEach(p=>{
      if(projetosPermitidos.includes(p.id_projeto)){

        const opt = document.createElement("option");
        opt.value = p.id_projeto;
        opt.textContent = p.nome;

        select.appendChild(opt);
      }
    });

    if(select.options.length > 0){
      selecionarProjeto();
    }
  });
}

// SELECIONAR
function selecionarProjeto(){
  projetoAtual = document.getElementById("projetoSelect").value;

  chamarAPI({action:"getProjeto",id_projeto:projetoAtual}, function(res){

    const p = res.projeto;

    if(p.background){
      document.body.style.background = `url('${p.background}') center/cover no-repeat`;
    }

    document.getElementById("logo").src = p.logo || "";
    document.getElementById("descricao").innerText = p.descricao || "";
  });

  carregarArquivos();
}

// ARQUIVOS
function carregarArquivos(){
  chamarAPI({action:"getArquivos",projeto:projetoAtual}, function(res){

    const tabela = document.getElementById("listaArquivos");
    tabela.innerHTML = "";

    res.arquivos.forEach(a=>{

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td><i class="${a.icone}"></i> ${a.nome}</td>
        <td>
          <button class="btn" title="Editar" onclick="editarArquivo('${a.nome}')">
            <i class="fas fa-pen"></i>
          </button>

          <button class="btn" title="Abrir" onclick="window.open('${a.link}')">
            <i class="fas fa-download"></i>
          </button>

          <button class="btn" title="Excluir" onclick="excluirArquivo('${a.nome}')">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      `;

      tabela.appendChild(tr);
    });
  });
}

// SALVAR
function salvar(){
  const nome = document.getElementById("nomeArquivo").value;
  const link = document.getElementById("fileLink").value;

  chamarAPI({
    action:"addArquivo",
    projeto:projetoAtual,
    nome,
    link,
    icone:iconeSelecionado
  }, function(res){
    if(res.ok){
      carregarArquivos();
    }
  });
}

// EDITAR
function editarArquivo(nome){
  const novoLink = prompt("Novo link:");
  if(!novoLink) return;

  chamarAPI({
    action:"addArquivo",
    projeto:projetoAtual,
    nome,
    link:novoLink,
    icone:iconeSelecionado
  }, function(){
    carregarArquivos();
  });
}

// EXCLUIR
function excluirArquivo(nome){
  if(!confirm("Excluir?")) return;

  chamarAPI({
    action:"deleteArquivo",
    projeto:projetoAtual,
    nome
  }, function(){
    carregarArquivos();
  });
}
</script>

</body>
</html>
