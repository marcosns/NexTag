<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel NexTag</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#111;
  color:#ffffff;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
}

.logo-main{
  display:block;
  margin:0 auto 10px;
  max-width:140px;
  cursor:pointer;
}

#logoProjeto{
  display:block;
  margin:10px auto 20px;
  max-height:70px;
}

.top{
  display:flex;
  justify-content:space-between;
}

.logout{
  font-size:12px;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

button{
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  background:rgba(255,255,255,0.15);
  color:#fff;
  margin:2px;
}

button:hover{
  background:rgba(255,255,255,0.25);
}

table{
  width:100%;
  margin-top:10px;
}

td{
  padding:8px;
  vertical-align:middle;
}

.acoes{
  display:flex;
  gap:5px;
  flex-wrap:nowrap;
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#222;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

.icon-picker{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.icon-picker i{
  padding:10px;
  background:#333;
  border-radius:10px;
  cursor:pointer;
}

.icon-picker i.selected{
  background:#4CAF50;
}

.footer{
  text-align:center;
  margin-top:20px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginDiv">
<img class="logo-main" onclick="mostrarEmail()" src="https://raw.githubusercontent.com/marcosns/NexTag/main/nextag_logo.png">

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()" style="width:100%">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel" style="display:none;">

<div class="top">
  <div></div>
  <button class="logout" onclick="logout()">Sair</button>
</div>

<img class="logo-main" onclick="mostrarEmail()" src="https://raw.githubusercontent.com/marcosns/NexTag/main/nextag_logo.png">

<img id="logoProjeto">

<p style="text-align:center;">Selecione o projeto</p>
<select id="projetoSelect" onchange="selecionarProjeto()"></select>

<div style="display:flex; justify-content:space-between; margin-top:20px;">
  <h3>Arquivos</h3>
  <div>
    <button onclick="abrirHistorico()">📜 Histórico</button>
    <button onclick="abrirModal()">+ Adicionar</button>
  </div>
</div>

<table>
  <tbody id="listaArquivos"></tbody>
</table>

</div>

<div class="footer">NexTag ©</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Novo arquivo</h3>

<input id="nomeArquivo" placeholder="Nome do arquivo">

<p>Selecione o ícone:</p>
<div class="icon-picker">
  <i class="fas fa-file" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-image" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-folder" onclick="selecionarIcone(this)"></i>
  <i class="fas fa-phone" onclick="selecionarIcone(this)"></i>
</div>

<input id="fileLink" placeholder="Cole o link do arquivo">

<button onclick="salvar()">Salvar</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby1bDZuXaD0rQTSPUMawKaeoB4l7sdrlAb9YXPq4xWaBo_Qn64_rUBRqAXzFanG37N_WQ/exec";

let projetosPermitidos = [];
let projetoAtual = null;
let iconeSelecionado = "fas fa-file";

// JSONP
function chamarAPI(params, callback){
  const cb = "cb_" + Date.now();
  const script = document.createElement("script");

  window[cb] = function(data){
    callback(data);
    delete window[cb];
    script.remove();
  };

  script.src = API_URL + "?" + new URLSearchParams(params) + "&callback=" + cb;
  document.body.appendChild(script);
}

// LOGIN
function login(){
  const usuario = document.getElementById("usuario").value;
  const senha = document.getElementById("senha").value;

  chamarAPI({action:"login",usuario,senha}, res=>{
    if(res.ok){

      projetosPermitidos = res.projetos;

      // 🔥 AQUI: aplica logo e background do usuário
      document.body.style.background = "url('" + res.background + "') center/cover no-repeat";
      document.getElementById("logoProjeto").src = res.logo;

      localStorage.setItem("user", usuario);
      localStorage.setItem("projetos", JSON.stringify(res.projetos));
      localStorage.setItem("logo", res.logo);
      localStorage.setItem("background", res.background);

      document.getElementById("loginDiv").style.display="none";
      document.getElementById("painel").style.display="block";

      carregarProjetos();
    } else {
      alert("Login inválido");
    }
  });
}

// AUTO LOGIN
window.onload = function(){
  const user = localStorage.getItem("user");
  const proj = localStorage.getItem("projetos");

  if(user && proj){
    projetosPermitidos = JSON.parse(proj);

    document.body.style.background = "url('" + localStorage.getItem("background") + "') center/cover no-repeat";
    document.getElementById("logoProjeto").src = localStorage.getItem("logo");

    document.getElementById("loginDiv").style.display="none";
    document.getElementById("painel").style.display="block";

    carregarProjetos();
  }
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// EMAIL AO CLICAR NO LOGO
function mostrarEmail(){
  alert("Contato: 3di.printer3d@gmail.com");
}

// PROJETOS
function carregarProjetos(){
  chamarAPI({action:"getProjetos"}, res=>{
    const select = document.getElementById("projetoSelect");
    select.innerHTML="";

    res.projetos.forEach(p=>{
      if(projetosPermitidos.includes(String(p.id_projeto))){
        const opt = document.createElement("option");
        opt.value = p.id_projeto;
        opt.textContent = p.nome;
        select.appendChild(opt);
      }
    });

    selecionarProjeto();
  });
}

// SELECIONAR PROJETO
function selecionarProjeto(){
  projetoAtual = document.getElementById("projetoSelect").value;
  carregarArquivos();
}

// MODAL
function abrirModal(){ document.getElementById("modal").style.display="flex"; }
function fecharModal(){ document.getElementById("modal").style.display="none"; }

// ÍCONE
function selecionarIcone(el){
  document.querySelectorAll(".icon-picker i").forEach(i=>i.classList.remove("selected"));
  el.classList.add("selected");
  iconeSelecionado = el.className;
}

// ARQUIVOS
function carregarArquivos(){
  chamarAPI({action:"getArquivos",projeto:projetoAtual}, res=>{
    const lista = document.getElementById("listaArquivos");
    lista.innerHTML="";

    res.arquivos.forEach(a=>{
      const tr = document.createElement("tr");

      tr.innerHTML =
        "<td><i class='" + a.icone + "'></i> " + a.nome + "</td>" +
        "<td class='acoes'>" +
        "<button onclick='window.open(" + JSON.stringify(a.link) + ")'>👁️</button>" +
        "<button onclick='editarArquivo(" + JSON.stringify(a.nome) + ")'>✏️</button>" +
        "<button onclick='window.open(" + JSON.stringify(a.link) + ")'>⬇️</button>" +
        "<button onclick='excluirArquivo(" + JSON.stringify(a.nome) + ")'>🗑️</button>" +
        "</td>";

      lista.appendChild(tr);
    });
  });
}

// SALVAR
function salvar(){
  chamarAPI({
    action:"addArquivo",
    projeto:projetoAtual,
    nome:document.getElementById("nomeArquivo").value,
    link:document.getElementById("fileLink").value,
    icone:iconeSelecionado
  }, ()=>{
    fecharModal();
    carregarArquivos();
  });
}

// EDITAR
function editarArquivo(nome){
  const novo = prompt("Novo link:");
  if(!novo) return;

  chamarAPI({action:"addArquivo",projeto:projetoAtual,nome,link:novo,icone:iconeSelecionado}, carregarArquivos);
}

// EXCLUIR
function excluirArquivo(nome){
  if(confirm("Excluir?")){
    chamarAPI({action:"deleteArquivo",projeto:projetoAtual,nome}, carregarArquivos);
  }
}

// HISTÓRICO (GERAL DO PROJETO)
function abrirHistorico(){
  alert("Histórico geral do projeto (implementar integração com aba Historico)");
}
</script>

</body>
</html>
