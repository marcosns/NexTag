<!DOCTYPE html> 
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexTag</title>

<!-- ✅ FAVICON -->
<link rel="icon" href="https://raw.githubusercontent.com/marcosns/NexTag/main/favicon.ico">

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  color:white;
  background:#111;
  background-size:cover;
  background-position:center;
}

/* vidro */
.container{
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.4);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:500px;
  margin:40px auto;
  text-align:center;
}

/* logo */
#logo{
  max-width:180px;
  margin-bottom:10px;
}

/* links */
a{
  display:flex;
  align-items:center;
  gap:10px;
  justify-content:center;

  background:rgba(255,255,255,0.1);
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  color:white;
  font-size:15px;
}

a:hover{
  background:rgba(255,255,255,0.2);
}
</style>

</head>

<body>

<div class="container">
  <img id="logo">
  <h2 id="nome"></h2>
  <p id="descricao"></p>

  <div id="lista"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby1bDZuXaD0rQTSPUMawKaeoB4l7sdrlAb9YXPq4xWaBo_Qn64_rUBRqAXzFanG37N_WQ/exec";

/* JSONP */
function chamarAPI(params, callback){
  const cb = "cb_" + Date.now();
  const script = document.createElement("script");

  window[cb] = function(data){
    callback(data);
    delete window[cb];
    script.remove();
  };

  script.src = API_URL + "?" + new URLSearchParams(params) + "&callback=" + cb + "&nocache=" + Date.now();

  script.onerror = () => {
    console.error("Erro na API");
    delete window[cb];
    script.remove();
  };

  document.body.appendChild(script);
}

/* pega ID */
function getProjeto(){
  const url = new URLSearchParams(window.location.search);
  return url.get("id");
}

/* carregar tudo */
function carregar(){

  const projeto = getProjeto();

  if(!projeto){
    alert("Projeto não informado na URL");
    return;
  }

  /* 🔥 NOVO: VISUAL DO USUARIO */
/* 🔹 PROJETO */
chamarAPI({
  action:"getProjeto",
  id_projeto: projeto
}, function(data){

  if(!data.projeto) return;

  const p = data.projeto;

  // 🔥 AQUI ESTAVA FALTANDO ISSO
  if(p.background){
    document.body.style.backgroundImage = `url('${p.background}')`;
  }

  if(p.logo){
    document.getElementById("logo").src = p.logo;
  }

  document.getElementById("nome").innerText = p.nome || "";
  document.getElementById("descricao").innerText = p.descricao || "";
});

  /* 🔹 PROJETO */
  chamarAPI({
    action:"getProjeto",
    id_projeto: projeto
  }, function(data){

    if(!data.projeto) return;

    const p = data.projeto;

    document.getElementById("nome").innerText = p.nome || "";
    document.getElementById("descricao").innerText = p.descricao || "";
  });

  /* 🔹 ARQUIVOS */
  chamarAPI({
    action:"getArquivos",
    projeto
  }, function(data){

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    (data.arquivos || []).forEach(a => {

      const div = document.createElement("a");

      div.href = a.link;
      div.target = "_blank";

      div.innerHTML = `
        <i class="${a.icone || 'fas fa-file'}"></i>
        ${a.nome}
      `;

      lista.appendChild(div);
    });

  });
}

window.onload = carregar;
</script>

</body>
</html>
