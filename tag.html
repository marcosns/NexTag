<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxQsYFZJ99VMM3vBCDgXeLZfwSnIQwaTmKPV2F5jenVQediVfj21bjOfTrguTFuOlFM8w/exec";

function getParametro(nome){
  return new URL(window.location.href).searchParams.get(nome);
}

async function carregar(){

  const id = getParametro("id");
  if(!id) return;

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"getProjetoCompleto",
      id_projeto:id
    })
  });

  const data = await res.json();
  if(!data.ok) return;

  const projeto = data.projeto;

  // 🔥 TEXTO
  document.getElementById("titulo").innerText = projeto.nome || "NexTag";
  document.getElementById("subtitulo").innerText = projeto.descricao || "";

  // 🔥 BACKGROUND DINÂMICO
  if(projeto.background){
    document.body.style.background = `url('${projeto.background}') no-repeat center/cover`;
  }

  // 🔥 LOGO
  const card = document.querySelector(".card");
  if(projeto.logo && card){
    const antigo = document.getElementById("logoProjeto");
    if(antigo) antigo.remove();
    card.insertAdjacentHTML("afterbegin",
      `<img id="logoProjeto" src="${projeto.logo}" style="width:120px;margin-bottom:15px;">`
    );
  }

  montarBotoes(data.arquivos || []);
}

// 🔥 BOTÕES
function montarBotoes(lista){
  const container = document.getElementById("botoes");
  container.innerHTML = "";

  lista.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerHTML = `<i class="${item.icone}"></i> ${item.nome}`;
    btn.onclick = () => abrirArquivo(item.fileId);
    container.appendChild(btn);
  });
}

// 🔥 ABRIR ARQUIVO
function abrirArquivo(link){
  if(link.includes("preview")){
    document.getElementById("pdfFrame").src = link;
    document.getElementById("modal").style.display = "flex";
  } else {
    window.open(link, "_blank");
  }
}

function fecharModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("pdfFrame").src = "";
}

carregar();
</script>
