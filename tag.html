<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NexTag</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background-size:cover;
  background-position:center;
}

/* efeito vidro */
.container{
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.4);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:500px;
  margin:50px auto;
  text-align:center;
}

a{
  display:block;
  background:rgba(255,255,255,0.1);
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

a:hover{
  background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">
  <img id="logo" style="max-width:180px"><br><br>
  <h2 id="nome"></h2>
  <p id="descricao"></p>

  <div id="lista"></div>
</div>

<script>
const API_URL = "COLE_SUA_URL_AQUI";

function chamarAPI(params, callback){

  const cb = "cb_" + Date.now();

  window[cb] = function(data){
    callback(data);
    delete window[cb];
  };

  const query = new URLSearchParams(params).toString();

  const script = document.createElement("script");
  script.src = `${API_URL}?${query}&callback=${cb}&nocache=${Date.now()}`;
  script.onload = () => script.remove();

  document.body.appendChild(script);
}

function getProjeto(){
  const url = new URLSearchParams(window.location.search);
  return url.get("id");
}

function carregar(){

  const projeto = getProjeto();

  // dados do projeto
  chamarAPI({
    action:"getProjetoInfo",
    projeto
  }, function(data){

    const p = data.projeto;

    document.body.style.backgroundImage = `url(${p.background})`;

    document.getElementById("logo").src = p.logo;
    document.getElementById("nome").innerText = p.nome;
    document.getElementById("descricao").innerText = p.descricao;
  });

  // arquivos
  chamarAPI({
    action:"getArquivos",
    projeto
  }, function(data){

    const lista = document.getElementById("lista");

    data.arquivos.forEach(a => {

      const link = `https://drive.google.com/file/d/${a.fileid}/preview`;

      const div = document.createElement("a");

      div.href = link;
      div.target = "_blank";

      div.innerHTML = `<i class="${a.icone}"></i> ${a.nome}`;

      lista.appendChild(div);
    });

  });
}

window.onload = carregar;
</script>

</body>
</html>
