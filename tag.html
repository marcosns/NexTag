<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxQsYFZJ99VMM3vBCDgXeLZfwSnIQwaTmKPV2F5jenVQediVfj21bjOfTrguTFuOlFM8w/exec"
  
function getParametro(nome){
  return new URL(window.location.href).searchParams.get(nome)
}

async function carregar(){

  const id = getParametro("id")

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"getObraCompleta",
      id_obra:id
    })
  })

  const data = await res.json()

  if(!data.ok) return

  const obra = data.obra

  // 🔥 TEXTO
  document.getElementById("titulo").innerText = obra.nome || "NexTag"
  document.getElementById("subtitulo").innerText = obra.descricao || ""

  // 🔥 BACKGROUND DINÂMICO
  if(obra.background){
    document.body.style.background = `url('${obra.background}') no-repeat center/cover`
  }

  // 🔥 LOGO
  if(obra.logo){
    document.querySelector(".card").insertAdjacentHTML("afterbegin",
      `<img id="logoObra" src="${obra.logo}" style="width:120px;margin-bottom:15px;">`
    )
  }

  montarBotoes(data.arquivos || [])
}


// 🔥 BOTÕES
function montarBotoes(lista){

  const container = document.getElementById("botoes")
  container.innerHTML = ""

  lista.forEach(item => {

    const btn = document.createElement("button")
    btn.className = "btn"

    btn.innerHTML = `<i class="${item.icone}"></i> ${item.nome}`

    // 🔥 AGORA USA LINK DIRETO (não só drive)
    btn.onclick = () => abrirArquivo(item.fileId)

    container.appendChild(btn)

  })

}


// 🔥 ABRIR ARQUIVO (INTELIGENTE)
function abrirArquivo(link){

  // Se for embed (drive preview)
  if(link.includes("preview")){
    document.getElementById("pdfFrame").src = link
    document.getElementById("modal").style.display = "flex"
  } 
  else {
    // abre externo (OneDrive, SharePoint, etc)
    window.open(link, "_blank")
  }

}

function fecharModal(){
  document.getElementById("modal").style.display = "none"
  document.getElementById("pdfFrame").src = ""
}

carregar()

</script>
