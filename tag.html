<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMV4URL5mSkJzKKoMgGSF5OK3ZrAD0_Rj4I7K50gRt9JRqEchLtWz69rJxwNGbUhBBTg/exec";

function getParametro(nome){
  return new URL(window.location.href).searchParams.get(nome);
}

async function carregar(){
  const id = getParametro("id");
  if(!id){ 
    console.error("ID do projeto não informado"); 
    return; 
  }

  try {
const url = `${API_URL}?action=getProjetoCompleto&id_projeto=${id}`;
const res = await fetch(url);
      })
    });

    const data = await res.json();
    console.log("RESPOSTA API:", data);

    if(!data.ok){ 
      console.error("Erro:", data.erro); 
      return; 
    }

    const projeto = data.projeto || {};

    // TEXTO
    document.getElementById("titulo").innerText = projeto.nome || "NexTag";
    document.getElementById("subtitulo").innerText = projeto.descricao || "";

    // BACKGROUND
    if(projeto.background){
      document.body.style.background = `url('${projeto.background}') no-repeat center/cover`;
    }

    // LOGO
    const divLogo = document.getElementById("logoProjeto");
    if(projeto.logo){
      divLogo.innerHTML = `<img src="${projeto.logo}" alt="Logo">`;
    }

    // BOTÕES
    montarBotoes(projeto.arquivos || projeto.files || []);

  } catch(e){ 
    console.error("Erro ao carregar projeto:", e); 
  }
}

function montarBotoes(lista){
  const container = document.getElementById("botoes");
  container.innerHTML = "";

  lista.forEach(item=>{
    const nome = item.nome || item.name || "Arquivo";
    const icone = item.icone || item.icon || "fa-solid fa-file";
    const link = item.fileId || item.file_id || item.link || "";

    if(!link){
      console.warn("Arquivo sem link:", item);
      return;
    }

    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerHTML = `<i class="${icone}"></i> ${nome}`;
    btn.onclick = () => abrirArquivo(link);

    container.appendChild(btn);
  });
}

function abrirArquivo(link){
  if(!link) return;

  if(link.includes("preview")){
    document.getElementById("pdfFrame").src = link;
    document.getElementById("modal").style.display = "flex";
  } else {
    window.open(link,"_blank");
  }
}

function fecharModal(){
  document.getElementById("modal").style.display = "none";
  document.getElementById("pdfFrame").src = "";
}

carregar();
</script>
