<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxG9FD61htdo2tM0LlPvpi_LTiMcZpt4d1ajgXFi9AajRkzZMyZe7xGa0RHadZuGfaKtw/exec"; // 🔥 coloque sua URL real

function getParametro(nome){
  return new URL(window.location.href).searchParams.get(nome);
}

async function carregar(){
  const id = getParametro("id");

  if(!id){
    alert("ID não informado");
    return;
  }

  try {
    const url = `${API_URL}?action=getProjetoCompleto&id_projeto=${id}`;

    const res = await fetch(url);
    const data = await res.json();

    console.log("API:", data);

    if(!data.ok){
      alert(data.erro);
      return;
    }

    const p = data.projeto;

    document.getElementById("titulo").innerText = p.nome;
    document.getElementById("descricao").innerText = p.descricao;

    if(p.logo){
      document.getElementById("logo").innerHTML =
        `<img src="${p.logo}" style="max-width:120px">`;
    }

    if(p.background){
      document.body.style.background =
        `url('${p.background}') center/cover`;
    }

    montarBotoes(p.arquivos);

  } catch(e){
    console.error(e);
    alert("Erro ao carregar");
  }
}

function montarBotoes(lista){
  const div = document.getElementById("botoes");
  div.innerHTML = "";

  lista.forEach(a=>{
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerHTML = `<i class="${a.icone}"></i> ${a.nome}`;

    btn.onclick = ()=>abrir(a.fileId);

    div.appendChild(btn);
  });
}

function abrir(link){
  if(!link) return;

  if(link.includes("preview")){
    document.getElementById("modal").style.display="flex";
    document.getElementById("frame").src = link;
  } else {
    window.open(link,"_blank");
  }
}

function fecharModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("frame").src="";
}

carregar();
</script>
