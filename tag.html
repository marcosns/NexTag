<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>NexTag</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background-size:cover;
  background-position:center;
}

/* efeito vidro */
.container{
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.4);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:500px;
  margin:50px auto;
  text-align:center;
}

a{
  display:block;
  background:rgba(255,255,255,0.1);
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

a:hover{
  background:rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="container">
  <img id="logo" style="max-width:180px"><br><br>
  <h2 id="nome"></h2>
  <p id="descricao"></p>

  <div id="lista"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyraD4enQmA7_SHdMfD7vQT8fQc9WjlaBHuskkRoM3tJm3S0SSgjJwUYyRSh3gNvlW1ng/exec";

// JSONP CORRIGIDO
function chamarAPI(params, callback){
  const cb = "cb_" + Date.now();

  const script = document.createElement("script");

  window[cb] = function(data){
    callback(data);

    // limpeza correta
    delete window[cb];
    script.remove();
  };

  script.src = `${API_URL}?${new URLSearchParams(params)}&callback=${cb}&nocache=${Date.now()}`;

  script.onerror = () => {
    console.error("Erro na API");
    delete window[cb];
    script.remove();
  };

  document.body.appendChild(script);
}

// pega ID da URL
function getProjeto(){
  const url = new URLSearchParams(window.location.search);
  return url.get("id");
}

function carregar(){

  const projeto = getProjeto();

  if(!projeto){
    alert("Projeto não informado na URL");
    return;
  }

  // 🔹 PROJETO (CORRIGIDO)
  chamarAPI({
    action:"getProjeto",
    id_projeto: projeto
  }, function(data){

    if(!data.projeto) return;

    const p = data.projeto;

    if(p.background){
      document.body.style.backgroundImage = `url('${p.background}')`;
    }

    document.getElementById("logo").src = p.logo || "";
    document.getElementById("nome").innerText = p.nome || "";
    document.getElementById("descricao").innerText = p.descricao || "";
  });

  // 🔹 ARQUIVOS (CORRIGIDO)
  chamarAPI({
    action:"getArquivos",
    projeto
  }, function(data){

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    (data.arquivos || []).forEach(a => {

      const div = document.createElement("a");

      div.href = a.link; // ✅ usa link direto
      div.target = "_blank";

      div.innerHTML = `<i class="${a.icone || 'fas fa-file'}"></i> ${a.nome}`;

      lista.appendChild(div);
    });

  });
}

window.onload = carregar;
</script>

</body>
</html>
