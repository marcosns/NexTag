<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Arquivos</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

.item{
  background:#1e293b;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
}
a{
  color:#38bdf8;
  text-decoration:none;
}
</style>

</head>

<body>

<h2>Arquivos do Projeto</h2>

<!-- 🔥 ESSENCIAL -->
<div id="lista"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxtkJsDc3QlGJvGd9BdwSkK7KrS1ZDA2zaED8rmLZJD7KVaB2Ru32lAAFUGkO3x7KW7vg/exec";

// JSONP
function chamarAPI(params, callback){

  const callbackName = "cb_" + Date.now();

  window[callbackName] = function(data){
    callback(data);
    delete window[callbackName];
  };

  const query = new URLSearchParams(params).toString();

  const script = document.createElement("script");
  script.src = `${API_URL}?${query}&callback=${callbackName}`;

  document.body.appendChild(script);
}

// pegar projeto da URL
function getProjeto(){
  const url = new URLSearchParams(window.location.search);
  return url.get("id");
}

// carregar arquivos
function carregar(){

  const projeto = getProjeto();

  if(!projeto){
    document.body.innerHTML = "Projeto não informado";
    return;
  }

  chamarAPI({
    action: "getArquivos",
    projeto
  }, function(data){

    console.log("RETORNO:", data);

    if(!data.ok){
      document.body.innerHTML = data.erro;
      return;
    }

    renderizar(data.arquivos);
  });
}

// render
function renderizar(lista){

  const container = document.getElementById("lista");
  container.innerHTML = "";

  lista.forEach(item => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <a href="${item.link}" target="_blank">
        ${item.nome}
      </a>
    `;

    container.appendChild(div);
  });
}

window.onload = carregar;
</script>

</body>
</html>
