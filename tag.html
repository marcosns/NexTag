<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxmQa-AE_805l6wxLMN5zN4W8IQbQka2c-AhYHXk0ZeDko74e0fjMN_mDFFXSLPGkpB8Q/exec";

// 🔹 PEGAR PARÂMETRO
function getParametro(nome){
  return new URL(window.location.href).searchParams.get(nome);
}

// 🔹 LOADING
function setLoading(msg="Carregando..."){
  document.getElementById("titulo").innerText = msg;
}

// 🔹 CARREGAR DADOS
async function carregar(){
  const id = getParametro("id");

  if(!id){
    setLoading("ID não informado");
    return;
  }

  setLoading("Carregando projeto...");

  try {
    const url = `${API_URL}?action=getProjetoCompleto&id_projeto=${id}`;

    console.log("URL:", url);

    const res = await fetch(url);

    if(!res.ok){
      throw new Error("Erro HTTP: " + res.status);
    }

    const data = await res.json();

    console.log("API:", data);

    if(!data.ok){
      setLoading(data.erro || "Erro ao carregar");
      return;
    }

    const p = data.projeto || {};

    // 🔹 TEXTO
    document.getElementById("titulo").innerText = p.nome || "Sem nome";
    document.getElementById("descricao").innerText = p.descricao || "";

    // 🔹 LOGO
    if(p.logo){
      document.getElementById("logo").innerHTML =
        `<img src="${p.logo}" style="max-width:120px">`;
    }

    // 🔹 BACKGROUND
    if(p.background){
      document.body.style.background =
        `url('${p.background}') center/cover no-repeat`;
    }

    // 🔹 BOTÕES
    montarBotoes(p.arquivos || []);

  } catch(e){
    console.error("Erro:", e);
    setLoading("Erro ao carregar projeto");
  }
}

// 🔹 BOTÕES
function montarBotoes(lista){
  const div = document.getElementById("botoes");
  div.innerHTML = "";

  if(!lista.length){
    div.innerHTML = "<p>Nenhum arquivo disponível</p>";
    return;
  }

  lista.forEach(a=>{
    const nome = a.nome || "Arquivo";
    const icone = a.icone || "fas fa-file";
    const link = a.fileId || "";

    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerHTML = `<i class="${icone}"></i> ${nome}`;

    btn.onclick = ()=>abrir(link);

    div.appendChild(btn);
  });
}

// 🔹 ABRIR ARQUIVO
function abrir(link){
  if(!link){
    alert("Arquivo inválido");
    return;
  }

  // PDF preview
  if(link.includes("preview")){
    document.getElementById("modal").style.display="flex";
    document.getElementById("frame").src = link;
  } 
  // Outros links
  else {
    window.open(link,"_blank");
  }
}

// 🔹 FECHAR MODAL
function fecharModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("frame").src="";
}

// 🔹 INIT
carregar();
</script>
